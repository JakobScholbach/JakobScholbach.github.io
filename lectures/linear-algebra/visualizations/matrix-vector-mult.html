<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Matrix–Vector Multiplication</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: system-ui, -apple-system, sans-serif;
    background: #ffffff; color: #1f2328;
    display: flex; min-height: 100vh;
  }
  #content {
    flex: 1; min-width: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 28px 18px; overflow-x: auto;
  }
  /* side panel (layout mirrors two-lines-3d.html) */
  #panel {
    width: 270px; flex-shrink: 0;
    background: #f6f8fa; border-left: 1px solid #d0d7de;
    padding: 16px; display: flex; flex-direction: column; gap: 14px;
    font-size: 0.875rem; overflow-y: auto;
  }
  #panel h1 { font-size: 1rem; font-weight: 600; }
  #panel .credit { font-size: 0.75rem; color: #8b949e; margin-top: 2px; }
  .sec { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.07em; color: #656d76; margin-bottom: 6px; }
  hr { border: none; border-top: 1px solid #d0d7de; }
  .hint { font-size: 0.74rem; color: #656d76; line-height: 1.6; }
  .swatch { display: inline-block; width: 11px; height: 11px; border-radius: 2px; vertical-align: middle; }

  .equation {
    display: flex; align-items: center; gap: 12px;
    flex-wrap: wrap; justify-content: center;
  }
  .op { font-size: 1.5rem; color: #656d76; padding: 0 4px; }

  /* bracket wrapper */
  .bracket-wrap { display: flex; align-items: stretch; gap: 0; }
  .bracket {
    display: flex; align-items: center;
    font-size: 2.6rem; color: #888; font-weight: 100;
    line-height: 1; padding: 0 2px; user-select: none;
  }

  /* matrix grid */
  .matrix-grid { display: grid; gap: 6px 8px; padding: 4px 6px; }
  .matrix-grid.m4n3 { grid-template-columns: repeat(3, 48px); }
  .matrix-grid.m3n1 { grid-template-columns: 48px; }
  .matrix-grid.m4n1 { grid-template-columns: 66px; }

  /* editable cells */
  input.cell {
    width: 48px; height: 34px; text-align: center;
    font-family: monospace; font-size: 0.9rem;
    border: 1px solid #d0d7de; border-radius: 5px;
    background: #fff; color: #1f2328; outline: none;
    transition: background 0.15s, border-color 0.15s;
  }
  input.cell:focus { border-color: #0081cd; }

  /* result cells (mygreen) */
  .res-cell {
    width: 66px; height: 34px;
    display: flex; align-items: center; justify-content: center;
    font-family: monospace; font-size: 0.9rem; font-weight: 600;
    border-radius: 5px;
    border: 1px solid #009246; color: #009246; background: rgba(0,146,70,0.06);
    cursor: default; transition: background 0.15s, color 0.15s;
  }
  .res-cell:hover { background: #009246; color: #fff; }

  /* highlight states */
  input.cell.hl-row { background: rgba(188,30,71,0.12); border-color: #bc1e47; }
  input.cell.hl-vec { background: rgba(0,129,205,0.12); border-color: #0081cd; }

  /* formula display */
  .formula-box {
    min-height: 44px; padding: 10px 12px;
    background: #fff; border: 1px solid #d0d7de; border-radius: 6px;
    font-size: 0.78rem; line-height: 1.7; overflow-x: auto;
    transition: opacity 0.2s;
  }
  .formula-box.empty { color: #8b949e; font-style: italic; }
  .formula-table { border-collapse: collapse; margin: 0; font-family: monospace; }
  .formula-table td { padding: 0 6px; line-height: 1.9; vertical-align: middle; }
  .formula-table .eq-col { text-align: center; padding: 0 8px; color: #656d76; }
  .formula-table .expr-col { text-align: left; }

  .term-pos { color: #bc1e47; font-weight: 600; }  /* matrix entry — first object */
  .term-vec { color: #0081cd; font-weight: 600; }  /* vector entry — second object */
  .term-res { color: #009246; font-weight: 600; }  /* result */

  @media (max-width: 600px) {
    body { flex-direction: column; min-height: auto; }
    #content { justify-content: flex-start; padding: 18px 10px; }
    #panel { width: 100%; border-left: none; border-top: 1px solid #d0d7de; }
    .op { font-size: 1.3rem; }
    .bracket { font-size: 2.2rem; }
  }
</style>
</head>
<body>

<div id="content">

<div class="equation">

  <!-- Matrix A (4×3) -->
  <div class="bracket-wrap">
    <div class="bracket">(</div>
    <div class="matrix-grid m4n3" id="matA"></div>
    <div class="bracket">)</div>
  </div>

  <!-- Vector v (3×1) -->
  <div class="bracket-wrap">
    <div class="bracket">(</div>
    <div class="matrix-grid m3n1" id="vecV"></div>
    <div class="bracket">)</div>
  </div>

  <div class="op">=</div>

  <!-- Result Av (4×1) -->
  <div class="bracket-wrap">
    <div class="bracket">(</div>
    <div class="matrix-grid m4n1" id="vecResult"></div>
    <div class="bracket">)</div>
  </div>

</div>

</div><!-- /#content -->

<div id="panel">
  <div>
    <h1>Multiplication of a matrix and a vector</h1>
    <div class="credit">Created by Wangrui Zhao</div>
  </div>
  <hr>

  <div>
    <div class="sec">Computation</div>
    <div class="formula-box empty" id="formulaBox">← Hover over a result entry</div>
  </div>
  <hr>

  <div>
    <div class="sec">How to use</div>
    <p class="hint">
      Hover over a result entry to see which products are summed.<br>
      Edit any value to update live.
    </p>
  </div>
  <hr>

  <div>
    <div class="sec">Legend</div>
    <p class="hint">
      <span class="swatch" style="background:#bc1e47"></span> active row of <b>A</b><br>
      <span class="swatch" style="background:#0081cd"></span> the vector <b>v</b><br>
      <span class="swatch" style="background:#009246"></span> resulting entry of <b>Av</b>
    </p>
  </div>
</div>

<script>
// Default values
const A = [
  [ 1,  2,  0],
  [ 3,  1, -1],
  [ 0,  2,  4],
  [-1,  0,  2]
];
const v = [2, 1, -1];

const M = 4, N = 3;

// Build matrix A inputs
const matA = document.getElementById('matA');
const aInputs = [];
for (let i = 0; i < M; i++) {
  aInputs[i] = [];
  for (let j = 0; j < N; j++) {
    const inp = document.createElement('input');
    inp.type = 'number'; inp.className = 'cell';
    inp.value = A[i][j];
    inp.dataset.row = i; inp.dataset.col = j;
    inp.addEventListener('input', updateResult);
    matA.appendChild(inp);
    aInputs[i][j] = inp;
  }
}

// Build vector v inputs
const vecV = document.getElementById('vecV');
const vInputs = [];
for (let j = 0; j < N; j++) {
  const inp = document.createElement('input');
  inp.type = 'number'; inp.className = 'cell';
  inp.value = v[j];
  inp.dataset.idx = j;
  inp.addEventListener('input', updateResult);
  vecV.appendChild(inp);
  vInputs[j] = inp;
}

// Build result cells
const vecResult = document.getElementById('vecResult');
const resCells = [];
for (let i = 0; i < M; i++) {
  const cell = document.createElement('div');
  cell.className = 'res-cell';
  cell.dataset.row = i;
  cell.addEventListener('mouseenter', () => highlightRow(i));
  cell.addEventListener('mouseleave', clearHighlight);
  vecResult.appendChild(cell);
  resCells[i] = cell;
}

function getA(i, j) { return parseFloat(aInputs[i][j].value) || 0; }
function getV(j)    { return parseFloat(vInputs[j].value)    || 0; }

function computeRow(i) {
  let sum = 0;
  for (let j = 0; j < N; j++) sum += getA(i, j) * getV(j);
  return sum;
}

function updateResult() {
  for (let i = 0; i < M; i++) {
    const val = computeRow(i);
    resCells[i].textContent = Number.isInteger(val) ? val : val.toFixed(2);
  }
  // refresh formula if hovering
  if (currentHover >= 0) showFormula(currentHover);
}

let currentHover = -1;

function highlightRow(i) {
  currentHover = i;
  // highlight row i of A
  for (let r = 0; r < M; r++)
    for (let c = 0; c < N; c++)
      aInputs[r][c].classList.toggle('hl-row', r === i);
  // highlight all of v
  for (let j = 0; j < N; j++)
    vInputs[j].classList.add('hl-vec');
  showFormula(i);
}

function clearHighlight() {
  currentHover = -1;
  for (let r = 0; r < M; r++)
    for (let c = 0; c < N; c++)
      aInputs[r][c].classList.remove('hl-row');
  for (let j = 0; j < N; j++)
    vInputs[j].classList.remove('hl-vec');
  const box = document.getElementById('formulaBox');
  box.innerHTML = '← Hover over a result entry';
  box.className = 'formula-box empty';
}

function showFormula(i) {
  const box = document.getElementById('formulaBox');
  box.className = 'formula-box';

  // Letter row
  const letterTerms = [];
  for (let j = 0; j < N; j++) {
    const aStr = `<span class="term-pos">a<sub>${i+1}${j+1}</sub></span>`;
    const vStr = `<span class="term-vec">v<sub>${j+1}</sub></span>`;
    letterTerms.push(`${aStr}·${vStr}`);
  }

  // Number row
  const numTerms = [];
  for (let j = 0; j < N; j++) {
    const a = getA(i, j), vj = getV(j);
    numTerms.push(`<span class="term-pos">${a}</span>·<span class="term-vec">${vj}</span>`);
  }

  const result = computeRow(i);
  const resVal = Number.isInteger(result) ? result : result.toFixed(2);

  box.innerHTML = `
    <table class="formula-table">
      <tr>
        <td>Row ${i+1} of <b>A</b>·<b>v</b></td>
        <td class="eq-col">=</td>
        <td class="expr-col">${letterTerms.join(' + ')}</td>
      </tr>
      <tr>
        <td></td>
        <td class="eq-col">=</td>
        <td class="expr-col">${numTerms.join(' + ')}</td>
      </tr>
      <tr>
        <td></td>
        <td class="eq-col">=</td>
        <td class="expr-col"><span class="term-res">${resVal}</span></td>
      </tr>
    </table>`;
}

updateResult();
</script>
</body>
</html>
