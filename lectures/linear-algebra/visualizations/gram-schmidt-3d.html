<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Gram-Schmidt Orthogonalization (3D)</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { display: flex; height: 100vh; margin: 0; overflow: hidden; font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: #fff; color: #1f2328; }
  #three-canvas { flex: 1; min-width: 0; position: relative; background: #fff; }
  canvas { display: block; width: 100% !important; height: 100% !important; touch-action: none; }

  #panel {
    width: 270px; flex-shrink: 0;
    background: #f6f8fa; border-left: 1px solid #d0d7de;
    padding: 16px; display: flex; flex-direction: column; gap: 16px;
    overflow-y: auto; color: #1f2328; font-size: 0.875rem;
  }
  @media (max-width: 600px) {
    body { flex-direction: column; height: auto; overflow-y: auto; }
    #three-canvas { width: 100%; height: 70vw; min-height: 280px; flex: none; }
    #panel { width: 100%; border-left: none; border-top: 1px solid #d0d7de; overflow-y: visible; }
  }

  /* ── shared base components (guidelines.md) ── */
  h1 { font-size: 1rem; font-weight: 600; }
  .sec { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.07em; color: #656d76; margin-bottom: 6px; }
  hr { border: none; border-top: 1px solid #d0d7de; }
  .note { background: #fff; border: 1px solid #d0d7de; border-radius: 6px; padding: 10px 12px; font-size: 0.8rem; line-height: 1.6; }
  .result-box { background: #fff; border: 1px solid #d0d7de; border-radius: 6px; padding: 10px 12px; font-size: 0.82rem; line-height: 1.8; font-family: monospace; }
  .hint { font-size: 0.72rem; color: #656d76; line-height: 1.5; }
  .swatch { display: inline-block; width: 11px; height: 11px; border-radius: 2px; vertical-align: middle; }
  .presets { display: flex; gap: 6px; flex-wrap: wrap; }
  button.preset { flex: 1 1 auto; padding: 7px 8px; cursor: pointer; background: #fff; border: 1px solid #d0d7de; border-radius: 6px; font-size: 0.8rem; color: #1f2328; font-family: inherit; }
  button.preset:hover { background: #f0f3f6; border-color: #b0b8c0; }
  button.preset:active { background: #e6eaee; }

  /* ── panel layout (not covered by shared base) ── */
  .panel-section { display: flex; flex-direction: column; gap: 8px; }
  .desc-box, .math-box { min-height: 70px; }
  .math-box { overflow-x: auto; white-space: nowrap; }

  .legend-box { font-size: 0.82rem; }
  .legend-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }

  /* ── animation controls (neutral chrome per UI table) ── */
  .controls-row { display: flex; gap: 6px; }
  button.ctrl { flex: 1; padding: 6px 10px; font-size: 0.85rem; font-weight: 600; cursor: pointer; border: 1px solid #d0d7de; border-radius: 6px; background: #fff; color: #1f2328; }
  button.ctrl:hover { background: #f0f3f6; border-color: #b0b8c0; }
  button.ctrl:active { background: #e6eaee; }
  button.ctrl.main { flex: 2; }

  .slider-container { display: flex; flex-direction: column; gap: 4px; margin-top: 4px; }
  .slider-labels { display: flex; justify-content: space-between; font-size: 0.75rem; font-weight: 600; color: #656d76; }
  input[type=range] { width: 100%; cursor: pointer; accent-color: #0081cd; }

  /* ── utils ── */
  .frac { display: inline-block; vertical-align: middle; text-align: center; font-size: 0.9em; margin: 0 4px; }
  .frac > span { display: block; padding: 0 2px; }
  .frac > span:first-child { border-bottom: 1px solid currentColor; }
</style>
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>

<body>
<div id="three-canvas"></div>
<div id="panel">
  <div class="panel-header">
    <h1>Gram-Schmidt Process</h1>
    <div class="hint">Created by Beshoy Metias</div>
  </div>

  <div class="panel-section">
    <div class="sec">Animation Controls</div>
    <div class="controls-row">
      <button id="btn-prev" class="ctrl" title="Previous Step">◀</button>
      <button id="btn-play" class="ctrl main">▶ Play</button>
      <button id="btn-next" class="ctrl" title="Next Step">▶</button>
    </div>
    <div class="slider-container">
      <div class="slider-labels">
        <span>Timeline</span>
        <span id="phase-label">Phase 0 / 8</span>
      </div>
      <input type="range" id="step-slider" min="0" max="8" step="0.01" value="0">
    </div>
  </div>

  <div class="panel-section">
    <div class="sec">Current Step</div>
    <div id="step-desc" class="note desc-box"></div>
  </div>

  <div class="panel-section">
    <div class="sec">Mathematical Formula</div>
    <div id="step-math" class="result-box math-box"></div>
  </div>

  <div class="panel-section">
    <div class="sec">Vector Legend</div>
    <div id="legend-content" class="legend-box"></div>
  </div>

  <div class="panel-section">
    <div class="sec">Presets</div>
    <div class="presets">
      <button class="preset" onclick="applyPreset('default')">Default</button>
      <button class="preset" onclick="applyPreset('ortho')">Orthogonal</button>
      <button class="preset" onclick="applyPreset('random')">Random</button>
    </div>
  </div>
</div>

<script type="module">
import * as THREE from 'three';
import {OrbitControls} from 'three/addons/controls/OrbitControls.js';

/* ── COLOR CONSTANTS ── */
const C = {
  red:    0xbc1e47,  // myred   — first vector
  blue:   0x0081cd,  // myblue  — second vector
  green:  0x009246,  // mygreen — result / sum
  yellow: 0xfec247,  // myyellow — angles / auxiliary
  gray:   0x888888,  // construction lines (dashed)
  purple: 0x7c3aed,  // 5th slot (extended palette) — third vector
};
// CSS-string equivalents for sprite labels / legend swatches
const CS = {
  red:'#bc1e47', blue:'#0081cd', green:'#009246', yellow:'#fec247',
  gray:'#888888', purple:'#7c3aed', proj:'#c9991a',
};

/* ── TIMELINE ── */
const TIMELINE=[
  'INIT',
  'S2_SUBSPACE_REVEAL','S2_PROJECTION','S2_RESULT',
  'S3_SUBSPACE_REVEAL','S3_PROJECTION','S3_RESULT',
  'NORMALIZATION'
];
const MAX_SLIDER=TIMELINE.length; // 8

/* ── STATE ── */
let currentMicro=0, targetMicro=0;
let playing=false, playTimer=null;
const PLAY_MS=2200, SMOOTH=0.08;
let lastRenderedStep = -1;

/* ── VECTORS ── */
let v1=new THREE.Vector3(1,1,0),v2=new THREE.Vector3(1,0,1),v3=new THREE.Vector3(0,1,1);
let w1=new THREE.Vector3(),w2=new THREE.Vector3(),w3=new THREE.Vector3();
let u1=new THREE.Vector3(),u2=new THREE.Vector3(),u3=new THREE.Vector3();
let p21=new THREE.Vector3(),p31=new THREE.Vector3(),p32=new THREE.Vector3();

function recalculateGS(){
  w1.copy(v1);
  const d11=w1.dot(w1);
  p21=d11>1e-6?w1.clone().multiplyScalar(w1.dot(v2)/d11):new THREE.Vector3();
  w2.copy(v2).sub(p21);
  const d22=w2.dot(w2);
  p31=d11>1e-6?w1.clone().multiplyScalar(w1.dot(v3)/d11):new THREE.Vector3();
  p32=d22>1e-6?w2.clone().multiplyScalar(w2.dot(v3)/d22):new THREE.Vector3();
  w3.copy(v3).sub(p31).sub(p32);
  u1=w1.length()>1e-6?w1.clone().normalize():new THREE.Vector3();
  u2=w2.length()>1e-6?w2.clone().normalize():new THREE.Vector3();
  u3=w3.length()>1e-6?w3.clone().normalize():new THREE.Vector3();
}

/* ── PROGRESS ── */
function getProgress(stateName){
  const idx=TIMELINE.indexOf(stateName);
  if(idx===-1)return 0;
  const k=Math.floor(currentMicro);
  if(k>idx)return 1;
  if(k<idx)return 0;
  return currentMicro-k;
}
function getDisplayStep(){
  return Math.ceil(targetMicro);
}
function lerp(a,b,t){return a+(b-a)*t;}

/* ── THREE SETUP ── */
const container=document.getElementById('three-canvas');
const renderer=new THREE.WebGLRenderer({antialias:true,alpha:false});
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
container.appendChild(renderer.domElement);

const scene=new THREE.Scene();
scene.background=new THREE.Color(0xffffff);

const camera=new THREE.PerspectiveCamera(50,1,0.1,100);
camera.position.set(4,3.5,5);

const controls=new OrbitControls(camera,renderer.domElement);
controls.enableDamping=true;controls.dampingFactor=0.12;

scene.add(new THREE.GridHelper(8,8,0xe0e0e0,0xd0d0d0));
scene.add(new THREE.AxesHelper(4));
scene.add(new THREE.AmbientLight(0xffffff,1));

const arrowsGroup=new THREE.Group();scene.add(arrowsGroup);
const labelsGroup=new THREE.Group();scene.add(labelsGroup);

/* ── DRAGGABLE HANDLES ── */
const handleGeo=new THREE.SphereGeometry(0.10,16,16);
const hMatV1=new THREE.MeshBasicMaterial({color:C.red,transparent:true});
const hMatV2=new THREE.MeshBasicMaterial({color:C.blue,transparent:true});
const hMatV3=new THREE.MeshBasicMaterial({color:C.purple,transparent:true});

const hV1=new THREE.Mesh(handleGeo,hMatV1);
const hV2=new THREE.Mesh(handleGeo,hMatV2);
const hV3=new THREE.Mesh(handleGeo,hMatV3);
[hV1,hV2,hV3].forEach(h=>{h.userData.draggable=true;scene.add(h)});
hV1.userData.vec=v1; hV2.userData.vec=v2; hV3.userData.vec=v3;

function syncHandles(){
  hV1.position.copy(v1);hV2.position.copy(v2);hV3.position.copy(v3);
}

/* ── DRAG LOGIC ── */
const raycaster=new THREE.Raycaster();
const mouse=new THREE.Vector2();
let dragging=null, hovering=null, dragPlane=new THREE.Plane();

renderer.domElement.addEventListener('pointermove',e=>{
  setMouse(e);
  raycaster.setFromCamera(mouse,camera);
  if(dragging){
    const pt=new THREE.Vector3();
    raycaster.ray.intersectPlane(dragPlane,pt);
    if(pt){
      dragging.userData.vec.copy(pt);
      dragging.position.copy(pt);
      recalculateGS();
      updateVisualization();
    }
  } else {
    const hits=raycaster.intersectObjects([hV1,hV2,hV3]);
    const h = hits.length ? hits[0].object : null;
    if (h !== hovering) {
      if (hovering) { hovering.scale.set(1,1,1); }
      hovering = h;
      if (hovering) {
        hovering.scale.set(1.3,1.3,1.3);
        renderer.domElement.style.cursor='grab';
      } else {
        renderer.domElement.style.cursor='';
      }
    }
  }
});

renderer.domElement.addEventListener('pointerdown',e=>{
  setMouse(e);
  raycaster.setFromCamera(mouse,camera);
  const hits=raycaster.intersectObjects([hV1,hV2,hV3]);
  if(hits.length){
    dragging=hits[0].object;
    renderer.domElement.style.cursor='grabbing';
    controls.enabled=false;
    const n=new THREE.Vector3();
    camera.getWorldDirection(n);
    dragPlane.setFromNormalAndCoplanarPoint(n,dragging.position);
    if(playing) stopPlay();
  }
});

renderer.domElement.addEventListener('pointerup',()=>{
  if(dragging){
    dragging=null;
    controls.enabled=true;
    renderer.domElement.style.cursor=hovering?'grab':'';
  }
});

renderer.domElement.addEventListener('pointerleave',()=>{
  if(dragging || hovering){
    dragging=null;
    controls.enabled=true;
    if (hovering) { hovering.scale.set(1,1,1); hovering=null; }
    renderer.domElement.style.cursor='';
  }
});

function setMouse(e){
  const r=renderer.domElement.getBoundingClientRect();
  mouse.x=((e.clientX-r.left)/r.width)*2-1;
  mouse.y=-((e.clientY-r.top)/r.height)*2+1;
}

/* ── HELPER: CLEAR GROUP (Fix WebGL Leaks) ── */
function clearGroup(group) {
  while(group.children.length) {
    const c = group.children[0];
    group.remove(c);
    if(c.geometry) c.geometry.dispose();
    if(c.material) {
      if(Array.isArray(c.material)) c.material.forEach(m => m.dispose());
      else c.material.dispose();
    }
  }
}

/* ── HELPER: ARROW ── */
function mkArrow(from,to,color,opacity=1, rOrder=1){
  const dir=new THREE.Vector3().subVectors(to,from);
  const len=dir.length();
  if(len<1e-5)return;
  dir.normalize();
  const headLen=Math.min(0.18,len*0.3);
  const headW=0.08;
  const arrow=new THREE.ArrowHelper(dir,from,len,color,headLen,headW);
  arrow.traverse(c=>{
    if(c.material){
        c.material.transparent=true;
        c.material.opacity=opacity;
        c.material.depthWrite=opacity>0.8;
    }
    c.renderOrder = rOrder;
  });
  arrowsGroup.add(arrow);
}

/* ── HELPER: DASH LINE ── */
function mkDash(from,to,color,opacity=1){
  const geo=new THREE.BufferGeometry().setFromPoints([from,to]);
  const mat=new THREE.LineDashedMaterial({color,dashSize:0.08,gapSize:0.06,transparent:true,opacity,depthWrite:false});
  const l=new THREE.Line(geo,mat);
  l.computeLineDistances();
  arrowsGroup.add(l);
}

/* ── HELPER: INFINITE LINE ── */
function mkInfLine(dir,color,opacity=1){
  if(dir.length()<1e-6)return;
  const d=dir.clone().normalize();
  const a=d.clone().multiplyScalar(-6);
  const b=d.clone().multiplyScalar(6);
  const geo=new THREE.BufferGeometry().setFromPoints([a,b]);
  const mat=new THREE.LineBasicMaterial({color,transparent:true,opacity,depthWrite:false});
  arrowsGroup.add(new THREE.Line(geo,mat));
}

/* ── HELPER: PLANE ── */
function mkPlane(d1,d2,color,opacity=0.12){
  if(d1.length()<1e-6||d2.length()<1e-6)return;
  const n1=d1.clone().normalize();
  const n2=d2.clone().normalize();
  const S=4;
  const corners=[
    n1.clone().multiplyScalar(S).add(n2.clone().multiplyScalar(S)),
    n1.clone().multiplyScalar(-S).add(n2.clone().multiplyScalar(S)),
    n1.clone().multiplyScalar(-S).add(n2.clone().multiplyScalar(-S)),
    n1.clone().multiplyScalar(S).add(n2.clone().multiplyScalar(-S)),
  ];
  const geo=new THREE.BufferGeometry().setFromPoints(corners);
  geo.setIndex([0,1,2,0,2,3]);
  geo.computeVertexNormals();
  const mat=new THREE.MeshBasicMaterial({color,transparent:true,opacity,side:THREE.DoubleSide,depthWrite:false});
  arrowsGroup.add(new THREE.Mesh(geo,mat));
}

/* ── HELPER: POINT ── */
function mkPoint(pos,color,opacity=1,size=0.06){
  const geo=new THREE.SphereGeometry(size,8,8);
  const mat=new THREE.MeshBasicMaterial({color,transparent:true,opacity,depthWrite:false});
  const m=new THREE.Mesh(geo,mat);
  m.position.copy(pos);
  arrowsGroup.add(m);
}

/* ── HELPER: RIGHT-ANGLE MARKER ── */
function mkRightAngle(corner,d1,d2,color,opacity=1){
  const s=0.15;
  const a=corner.clone().add(d1.clone().normalize().multiplyScalar(s));
  const b=corner.clone().add(d2.clone().normalize().multiplyScalar(s));
  const c=a.clone().add(d2.clone().normalize().multiplyScalar(s));
  const pts=[a,c,b];
  const geo=new THREE.BufferGeometry().setFromPoints(pts);
  const mat=new THREE.LineBasicMaterial({color,transparent:true,opacity,depthWrite:false});
  arrowsGroup.add(new THREE.Line(geo,mat));
}

/* ── HELPER: SPRITE LABEL ── */
const labelCache={};
function mkLabel(text,position,color,opacity=1, rOrder=1){
  if(opacity<0.01)return;
  const key=text+'_'+color;
  let tex;
  if(labelCache[key]){
    tex=labelCache[key];
  }else{
    const canvas=document.createElement('canvas');
    canvas.width=256;canvas.height=96;
    const ctx=canvas.getContext('2d');
    ctx.clearRect(0,0,256,96);
    ctx.font='bold 48px "Segoe UI",system-ui,sans-serif';
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillStyle='white';
    ctx.fillText(text,128-2,48-2);ctx.fillText(text,128+2,48-2);
    ctx.fillText(text,128-2,48+2);ctx.fillText(text,128+2,48+2);
    ctx.fillStyle=color;
    ctx.fillText(text,128,48);
    tex=new THREE.CanvasTexture(canvas);
    tex.minFilter=THREE.LinearFilter;
    labelCache[key]=tex;
  }
  const mat=new THREE.SpriteMaterial({map:tex,transparent:true,opacity,depthWrite:false,depthTest:false,sizeAttenuation:true});
  const sprite=new THREE.Sprite(mat);
  sprite.renderOrder = rOrder + 10;
  sprite.position.copy(position);
  sprite.scale.set(0.7,0.26,1);
  labelsGroup.add(sprite);
}

/* ── HELPER: UNIT SPHERE ── */
function mkSphere(opacity){
  if(opacity<0.01)return;
  const geo=new THREE.SphereGeometry(1,24,18);
  const mat=new THREE.MeshBasicMaterial({color:C.gray,wireframe:true,transparent:true,opacity:opacity*0.3,depthWrite:false});
  arrowsGroup.add(new THREE.Mesh(geo,mat));
}

/* ── LABEL OFFSET ── */
function labelPos(tip){
  return tip.clone().add(new THREE.Vector3(0,0.2,0));
}

/* ── UPDATE VISUALIZATION ── */
function updateVisualization(){
  /* clear using properly disposing function */
  clearGroup(arrowsGroup);
  clearGroup(labelsGroup);

  const O=new THREE.Vector3(0,0,0);

  const pInit=getProgress('INIT');
  const pS2Sub=getProgress('S2_SUBSPACE_REVEAL');
  const pS2Proj=getProgress('S2_PROJECTION');
  const pS2Res=getProgress('S2_RESULT');
  const pS3Sub=getProgress('S3_SUBSPACE_REVEAL');
  const pS3Proj=getProgress('S3_PROJECTION');
  const pS3Res=getProgress('S3_RESULT');
  const pNorm=getProgress('NORMALIZATION');

  /* ── Original vectors ── */
  const v1Op=lerp(1.0, 0.15, pInit);
  if(v1Op>0.01){
    mkArrow(O,v1,C.red,v1Op,0);
    mkLabel('v₁',labelPos(v1),CS.red,v1Op,0);
  }
  hMatV1.opacity=v1Op;
  hMatV1.depthWrite=v1Op>0.8;

  const v2Op=pS2Res>0? lerp(1.0, 0.15, pS2Res) : 1;
  if(v2Op>0.01){
    mkArrow(O,v2,C.blue,v2Op,0);
    mkLabel('v₂',labelPos(v2),CS.blue,v2Op,0);
  }
  hMatV2.opacity=v2Op;
  hMatV2.depthWrite=v2Op>0.8;

  const v3Op=pS3Res>0? lerp(1.0, 0.15, pS3Res) : 1;
  if(v3Op>0.01){
    mkArrow(O,v3,C.purple,v3Op,0);
    mkLabel('v₃',labelPos(v3),CS.purple,v3Op,0);
  }
  hMatV3.opacity=v3Op;
  hMatV3.depthWrite=v3Op>0.8;

  /* ── w₁ ── */
  if(pInit>0){
    const normFactor=pNorm>0?lerp(1,1/(w1.length()||1),pNorm):1;
    const growT=Math.min(pInit,1);
    const w1Cur=w1.clone().multiplyScalar(growT*normFactor);
    if(w1Cur.length()>1e-5){
      mkArrow(O,w1Cur,C.green,1);
      const lbl=pNorm>0.5?'u₁':'w₁';
      mkLabel(lbl,labelPos(w1Cur),CS.green,1);
    }
  }

  /* ── Step 2: subspace line ── */
  if(pS2Sub>0){
    const lineOp=pS2Res>0?lerp(pS2Sub,0.15,pS2Res):pS2Sub;
    mkInfLine(w1,C.yellow,lineOp);
    if(lineOp>0.05){
      mkDash(v2,p21,C.gray,lineOp);
      const dropDir=new THREE.Vector3().subVectors(v2,p21);
      if(dropDir.length()>0.1&&w1.length()>0.1){
        mkRightAngle(p21,w1,dropDir,C.gray,lineOp);
      }
      mkPoint(p21,C.yellow,lineOp,0.05);
    }
  }

  /* ── Step 2: projection p₂₁ ── */
  if(pS2Proj>0){
    const pOp=pS2Res>0?1-pS2Res:1;
    const p21Cur=p21.clone().multiplyScalar(pS2Proj);
    if(p21Cur.length()>1e-5&&pOp>0.01){
      mkArrow(O,p21Cur,C.yellow,pOp);
      mkLabel('p₂₁',labelPos(p21Cur),CS.proj,pOp);
    }
  }

  /* ── w₂ ── */
  if(pS2Res>0){
    const normFactor=pNorm>0?lerp(1,1/(w2.length()||1),pNorm):1;
    const w2Cur=w2.clone().multiplyScalar(pS2Res*normFactor);
    if(w2Cur.length()>1e-5){
      mkArrow(O,w2Cur,C.green,1);
      const lbl=pNorm>0.5?'u₂':'w₂';
      mkLabel(lbl,labelPos(w2Cur),CS.green,1);
    }
  }

  /* ── Step 3: subspace plane ── */
  if(pS3Sub>0){
    const planeOp=pS3Res>0?lerp(pS3Sub*0.12,0.15*0.12,pS3Res): pS3Sub*0.12;
    mkPlane(w1,w2,C.yellow,planeOp);
    const totalProj=p31.clone().add(p32);
    const dropOp=pS3Res>0?lerp(pS3Sub,0.15,pS3Res):pS3Sub;
    if(dropOp>0.05){
      mkDash(v3,totalProj,C.gray,dropOp);
      const dropDir3=new THREE.Vector3().subVectors(v3,totalProj);
      const planeNormal=new THREE.Vector3().crossVectors(w1,w2).normalize();
      if(dropDir3.length()>0.1&&planeNormal.length()>0.1){
        const inPlane=new THREE.Vector3().subVectors(totalProj,O);
        if(inPlane.length()>0.1){
          mkRightAngle(totalProj,inPlane,dropDir3,C.gray,dropOp);
        }
      }
      mkPoint(totalProj,C.yellow,dropOp,0.05);
    }
  }

  /* ── Step 3: projections p₃₁, p₃₂ ── */
  if(pS3Proj>0){
    const pOp=pS3Res>0?1-pS3Res:1;
    const p31Cur=p31.clone().multiplyScalar(pS3Proj);
    if(p31Cur.length()>1e-5&&pOp>0.01){
      mkArrow(O,p31Cur,C.yellow,pOp);
      mkLabel('p₃₁',labelPos(p31Cur),CS.proj,pOp);
    }
    const p32Cur=p32.clone().multiplyScalar(pS3Proj);
    if(p32Cur.length()>1e-5&&pOp>0.01){
      mkArrow(O,p32Cur,C.yellow,pOp);
      mkLabel('p₃₂',labelPos(p32Cur),CS.proj,pOp);
    }
    if(pOp>0.05){
      const totalProj=p31Cur.clone().add(p32Cur);
      mkDash(p31Cur,totalProj,C.gray,pOp*0.6);
      mkDash(p32Cur,totalProj,C.gray,pOp*0.6);
    }
  }

  /* ── w₃ ── */
  if(pS3Res>0){
    const normFactor=pNorm>0?lerp(1,1/(w3.length()||1),pNorm):1;
    const w3Cur=w3.clone().multiplyScalar(pS3Res*normFactor);
    if(w3Cur.length()>1e-5){
      mkArrow(O,w3Cur,C.green,1);
      const lbl=pNorm>0.5?'u₃':'w₃';
      mkLabel(lbl,labelPos(w3Cur),CS.green,1);
    }
  }

  /* ── Unit sphere ── */
  if(pNorm>0){
    mkSphere(pNorm);
  }

  syncHandles();
  hV1.visible=true;hV2.visible=true;hV3.visible=true;
}

/* ── STEP INFO & LEGEND ── */
function f(n){ return (Math.abs(n)<1e-3?0:n).toFixed(2); }
function vS(v){ return `(${f(v.x)}, ${f(v.y)}, ${f(v.z)})`; }

function updateStepInfo(k){
  const fr = (n,d) => `<span class="frac"><span>${n}</span><span>${d}</span></span>`;
  const cR='color:#bc1e47', cB='color:#0081cd', cP='color:#7c3aed', cG='color:#009246';
  const sv1=`<b style="${cR}">v₁</b>`, sv2=`<b style="${cB}">v₂</b>`, sv3=`<b style="${cP}">v₃</b>`;
  const sw1=`<b style="${cG}">w₁</b>`, sw2=`<b style="${cG}">w₂</b>`, sw3=`<b style="${cG}">w₃</b>`;
  const sp21=`<b style="color:#b88c00">p₂₁</b>`;
  let desc='', math='';

  if(k===0){
    desc = `Let ${sv1}, ${sv2}, ${sv3} be linearly independent.`;
    math = `${sv1} = ${vS(v1)}<br>${sv2} = ${vS(v2)}<br>${sv3} = ${vS(v3)}`;
  } else if(k===1){
    desc = `<b>Step 1</b><br>The first vector is kept as is.`;
    math = `${sw1} = ${sv1} = ${vS(w1)}`;
  } else if(k===2){
    desc = `<b>Step 2a — Subspace</b><br>Visualize span(${sw1}).`;
    math = `L = span(${sw1})`;
  } else if(k===3){
    desc = `<b>Step 2b — Projection</b><br>Compute projection ${sp21}.`;
    const n=w1.dot(v2),d=w1.dot(w1);
    math = `${sp21} = ${fr(`⟨${sw1}, ${sv2}⟩`,`⟨${sw1}, ${sw1}⟩`)} ${sw1}<br><br>${sp21} = ${fr(f(n),f(d))} ${vS(w1)}`;
  } else if(k===4){
    desc = `<b>Step 2 ✓</b><br>${sw2} is the orthogonal residual.`;
    math = `${sw2} = ${sv2} − ${sp21} = ${vS(w2)}`;
  } else if(k===5){
    desc = `<b>Step 3a — Subspace Plane</b><br>Visualize the plane span(${sw1}, ${sw2}).`;
    math = `P = span(${sw1}, ${sw2})`;
  } else if(k===6){
    desc = `<b>Step 3b — Projections</b><br>Decompose projection onto the plane.`;
    math = `<b style="color:#b88c00">p₃₁</b> = ${fr(`⟨${sw1}, ${sv3}⟩`,`⟨${sw1}, ${sw1}⟩`)} ${sw1}<br><br><b style="color:#b88c00">p₃₂</b> = ${fr(`⟨${sw2}, ${sv3}⟩`,`⟨${sw2}, ${sw2}⟩`)} ${sw2}`;
  } else if(k===7){
    desc = `<b>Step 3 ✓</b><br>${sw3} is the orthogonal residual.`;
    math = `${sw3} = ${sv3} − <b style="color:#b88c00">p₃₁</b> − <b style="color:#b88c00">p₃₂</b> = ${vS(w3)}`;
  } else if(k===8){
    desc = `<b>Normalization</b><br>Divide each vector by its magnitude: <b>uᵢ = wᵢ / ‖wᵢ‖</b>`;
    math = `u₁ = ${vS(u1)}<br>u₂ = ${vS(u2)}<br>u₃ = ${vS(u3)}`;
  }
  document.getElementById('step-desc').innerHTML=desc;
  document.getElementById('step-math').innerHTML=math;
}

function swatch(c){return `<span class="swatch" style="background:${c}"></span>`}
function updateLegend(k){
  const leg=document.getElementById('legend-content');
  let rows=[];
  if(k===0){
    rows.push(`<div class="legend-row">${swatch(CS.red)} <b>v₁</b> — input</div>`);
    rows.push(`<div class="legend-row">${swatch(CS.blue)} <b>v₂</b> — input</div>`);
    rows.push(`<div class="legend-row">${swatch(CS.purple)} <b>v₃</b> — input</div>`);
  }else if(k===1){
    rows.push(`<div class="legend-row">${swatch(CS.red)} <b>v₁</b> <span style="color:#aaa">(faded)</span></div>`);
    rows.push(`<div class="legend-row">${swatch(CS.green)} <b>w₁ = v₁</b></div>`);
    rows.push(`<div class="legend-row">${swatch(CS.blue)} <b>v₂</b></div>`);
    rows.push(`<div class="legend-row">${swatch(CS.purple)} <b>v₃</b></div>`);
  }else if(k===2||k===3){
    rows.push(`<div class="legend-row">${swatch(CS.green)} <b>w₁</b></div>`);
    rows.push(`<div class="legend-row">${swatch(CS.blue)} <b>v₂</b></div>`);
    rows.push(`<div class="legend-row">${swatch(CS.purple)} <b>v₃</b></div>`);
    rows.push(`<div class="legend-row">${swatch(CS.yellow)} <b style="color:#b88c00">p₂₁</b> — projection</div>`);
  }else if(k===4){
    rows.push(`<div class="legend-row">${swatch(CS.green)} <b>w₁</b></div>`);
    rows.push(`<div class="legend-row">${swatch(CS.green)} <b>w₂ = v₂ − p₂₁</b></div>`);
    rows.push(`<div class="legend-row">${swatch(CS.blue)} <b>v₂</b> <span style="color:#aaa">(faded)</span></div>`);
    rows.push(`<div class="legend-row">${swatch(CS.purple)} <b>v₃</b></div>`);
  }else if(k===5||k===6){
    rows.push(`<div class="legend-row">${swatch(CS.green)} <b>w₁, w₂</b></div>`);
    rows.push(`<div class="legend-row">${swatch(CS.purple)} <b>v₃</b></div>`);
    rows.push(`<div class="legend-row">${swatch(CS.yellow)} <b style="color:#b88c00">p₃₁, p₃₂</b> — projections</div>`);
  }else if(k===7){
    rows.push(`<div class="legend-row">${swatch(CS.green)} <b>w₁, w₂, w₃</b> — orthogonal residuals</div>`);
  }else if(k===8){
    rows.push(`<div class="legend-row">${swatch(CS.green)} <b>u₁, u₂, u₃</b> — orthonormal basis</div>`);
    rows.push(`<div class="legend-row">${swatch('#888')} unit sphere</div>`);
  }
  rows.push(`<div class="hint" style="margin-top:8px;border-top:1px solid #d0d7de;padding-top:8px;">• Drag the colored spheres to change basis vectors.</div>`);
  leg.innerHTML=rows.join('');
}

/* ── UI WIRING ── */
const slider=document.getElementById('step-slider');
const phaseLabel=document.getElementById('phase-label');
const btnPrev=document.getElementById('btn-prev');
const btnNext=document.getElementById('btn-next');
const btnPlay=document.getElementById('btn-play');

slider.addEventListener('input',()=>{
  targetMicro=parseFloat(slider.value);
  currentMicro=targetMicro;
  updateUI();
  updateVisualization();
});

btnPrev.addEventListener('click',()=>{
  stopPlay();
  targetMicro=Math.max(0,Math.ceil(targetMicro)-1);
});

btnNext.addEventListener('click',()=>{
  stopPlay();
  targetMicro=Math.min(MAX_SLIDER,Math.floor(targetMicro)+1);
});

btnPlay.addEventListener('click',()=>{
  if(playing){stopPlay();return;}
  playing=true;btnPlay.classList.add('active');btnPlay.textContent='⏸ Pause';
  if(currentMicro>=MAX_SLIDER){currentMicro=0;targetMicro=0;}
  advancePlay();
});

function advancePlay(){
  if(!playing)return;
  const next=Math.min(Math.floor(targetMicro)+1,MAX_SLIDER);
  targetMicro=next;
  if(next>=MAX_SLIDER){
    playTimer=setTimeout(()=>{stopPlay();},PLAY_MS);
  }else{
    playTimer=setTimeout(advancePlay,PLAY_MS);
  }
}

function stopPlay(){
  playing=false;btnPlay.classList.remove('active');btnPlay.textContent='▶ Play';
  if(playTimer){clearTimeout(playTimer);playTimer=null;}
}

function updateUI(){
  slider.value=currentMicro;
  const k=getDisplayStep();
  if(k!==lastRenderedStep){
    phaseLabel.textContent=`Phase ${k} / 8`;
    updateStepInfo(k);
    updateLegend(k);
    lastRenderedStep=k;
  }
}

/* ── PRESETS ── */
window.applyPreset=function(name){
  stopPlay();
  if(name==='default'){v1.set(1,1,0);v2.set(1,0,1);v3.set(0,1,1);}
  else if(name==='ortho'){v1.set(2,0,0);v2.set(0,2,0);v3.set(0,0,2);}
  else{
    const r=()=>parseFloat((Math.random()*3-1.5).toFixed(2));
    v1.set(r(),r(),r());v2.set(r(),r(),r());v3.set(r(),r(),r());
  }
  recalculateGS();syncHandles();updateUI();updateVisualization();
};

/* ── RESIZE ── */
function onResize(){
  const w=container.clientWidth,h=container.clientHeight;
  camera.aspect=w/h;camera.updateProjectionMatrix();
  renderer.setSize(w,h);
}
window.addEventListener('resize',onResize);

/* ── ANIMATION LOOP ── */
let lastT = 0;
function animate(t){
  requestAnimationFrame(animate);
  const dt=Math.min((t-lastT)/1000, 0.1); lastT=t;

  const diff=targetMicro-currentMicro;
  if(Math.abs(diff)>0.001){
    currentMicro+=diff*SMOOTH;
    if(Math.abs(targetMicro-currentMicro)<0.005)currentMicro=targetMicro;
    if(!dragging) updateUI();
    updateVisualization();
  }
  controls.update();
  renderer.render(scene,camera);
}

/* ── BOOT ── */
recalculateGS();
syncHandles();
onResize();
updateUI();
updateVisualization();
requestAnimationFrame(animate);
</script>
