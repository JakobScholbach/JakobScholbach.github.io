", "express-as-linear-combination", "find-basis-and-dimension"]}, {"label": "ex:euclid-6-3", "displayLabel": "7.5", "statement": "Compute the orthogonal complement of $T = L((1,0,-3))$.", "solution": "This solution illustrates Task 7.63.\n\nThe orthogonal complement of $T$ is given by vectors $(x,y,z)$ such that $x-3z=0$.\nI.e., with free parameters $y = a$, $z = b$, $x = 3b$.\nThus\n$$T^\\bot = L((3,0,1), (0,1,0)).$$", "primary": ["compute-orthogonal-complement"], "secondary": ["parametrize-solution-set"]}, {"label": "ex:euclid-6-4", "displayLabel": "7.6", "statement": "Is there a subspace $U \\subset {\\bf R}^3$ such that\n\\begin{enumerate}\n   \\item the orthogonal projection of $t=(1,1,0)$ onto $U$ is given by $(1,5,6)$?\n   \\item the orthogonal projection of $t=(2,0,1)$ onto $U$ is given by $(1,1,1)$?\n \\end{enumerate}", "solution": "We want to find $U$ such that $U \\oplus U^\\bot = {\\bf R}^3$ and $t=(1,5,6) + t_\\bot$, with $(1,5,6) \\in U$ and $t_\\bot \\in U^\\bot$.\nThis in particular means that $(1,5,6) \\bot t_\\bot$.\nSolving the equation\n$$(1,1,0) = (1,5,6) + t_\\bot$$\ngives $t_\\bot = (1,1,0)-(1,5,6) = (0,-4,-6)$.\nBut\n$${\\left \\langle (1,5,6), (0,-4,-6) \\right \\rangle} = -20 + 36 = 16 \\ne 0,$$\nso these two vectors are \\emph{not} orthogonal.\nTherefore there is \\emph{no} such subspace $U$.\n\nWe solve the second part similarly:\nwe have $t - (1,1,1) = (1,-1,0)$, so the Ansatz is $t_\\bot = (1,-1,0)$.\nWe compute ${\\left \\langle (1,1,1), (1,-1,0) \\right \\rangle} = 0$, so these vectors are orthogonal.\nWe now compute $U$: $(1,1,1) \\in U$, so that we can take $U = L(1,1,1)$.", "primary": ["decide-existence-of-projection-subspace"], "secondary": ["use-scalar-product-definition", "construct-example-or-counterexample"]}, {"label": "ex:euclid-6-6", "displayLabel": "7.7", "statement": "Let $L = \\left ( \\begin{array}{c}\n1 \\\\\n3 \\\\\n5\n\\end{array} \\right ) + L (\\left ( \\begin{array}{c}\n1 \\\\\n1 \\\\\n4\n\\end{array} \\right ))$.\nCompute the closest point of $L$ to the origin, and its distance to the origin.", "solution": "This solution illustrates Task 7.62.\n\nAccording to Proposition 7.45, the unique point $v \\in {\\bf R}^3$ that is lying on $L$ and as close as possible to the origin is given by\n$$v = v_0 - p_L(v_0),$$\nwhere $v_0 = \\left ( \\begin{array}{c}\n1 \\\\\n3 \\\\\n5\n\\end{array} \\right )$.\nWe will use Theorem 7.24 in order to compute this.\nThe underlying subspace $W$ of $L$ is spanned by $v_1 = \\left ( \\begin{array}{c}\n1 \\\\\n1 \\\\\n4\n\\end{array} \\right )$. Renormalizing this vector to norm one, gives $w_1 = \\frac{v_1}{|\\hspace{-0.5mm}| {v_1} |\\hspace{-0.5mm}|} = \\frac{v_1}{\\sqrt{18}}$.\nThis vector $w_1$ is therefore an orthonormal basis of $W$.\nWe then have \n$$p_L(v_0)={\\left \\langle v_0, w_1 \\right \\rangle}w_1 = \\frac{24}{18} \\left ( \\begin{array}{c}\n1 \\\\\n1 \\\\\n4\n\\end{array} \\right )$$\nand therefore\n$$v = \\left ( \\begin{array}{c}\n1 \\\\\n3 \\\\\n5\n\\end{array} \\right ) -\\frac{24}{18} \\left ( \\begin{array}{c}\n1 \\\\\n1 \\\\\n4\n\\end{array} \\right ) = \\left ( \\begin{array}{c}\n-1/3 \\\\\n5/3 \\\\\n-1/3\n\\end{array} \\right ).$$\nThis vector has norm\n$$|\\hspace{-0.5mm}| {v} |\\hspace{-0.5mm}| = \\sqrt{27/9}= \\sqrt 3.$$", "primary": ["compute-distance-between-affine-subspaces", "compute-orthogonal-projection"], "secondary": ["compute-orthonormal-basis"]}, {"label": "ex:euclid-6-7", "displayLabel": "7.8", "statement": "Consider the two lines\n$L: x=1+t,y=t,z=2+t, t \\in {\\bf R}$   and    $L':x-3=y-1=z-3$.\nAre they parallel? Compute the distance between $L$ and $L'$.", "solution": "This solution illustrates Task 7.70, Task 7.74.\n\nThe subspace $W$ underlying $L$ is spanned by $\\left ( \\begin{array}{c}\n1 \\\\\n1 \\\\\n1\n\\end{array} \\right )$, while the equations for $L'$ are equivalent to $x=z$ and $y = z+2$.\nTherefore, this line has the underlying subspace $\\left ( \\begin{array}{c}\n1 \\\\\n1 \\\\\n1\n\\end{array} \\right )$ as well. \nBy Definition 7.42, the lines are therefore parallel.\nLet $w = \\left ( \\begin{array}{c}\n1 \\\\\n1 \\\\\n1\n\\end{array} \\right )$ be the direction vector for both lines (cf.~Definition 7.50). \nBelow, we will consider its renormalization to norm 1, which is $w_1 = \\frac 1 {\\sqrt3} \\left ( \\begin{array}{c}\n1 \\\\\n1 \\\\\n1\n\\end{array} \\right )$.\n\nLet $v_0 = \\left ( \\begin{array}{c}\n1 \\\\\n0 \\\\\n2\n\\end{array} \\right )$ and $v'_0 = \\left ( \\begin{array}{c}\n0 \\\\\n-2 \\\\\n0\n\\end{array} \\right )$. Then the distance vector $d = v_0 - v'_0 = \\left ( \\begin{array}{c}\n1 \\\\\n2 \\\\\n2\n\\end{array} \\right )$ is not orthogonal to $L$ (${\\left \\langle d, w \\right \\rangle} \\ne 0$).\nWe compute the orthogonal projection of $d$ onto $W^\\bot$ by computing\n$$d - {\\left \\langle d, w_1 \\right \\rangle} w_1 = \\left ( \\begin{array}{c}\n1 \\\\\n2 \\\\\n2\n\\end{array} \\right ) - \\frac 1 3 \\left ( \\begin{array}{c}\n1 \\\\\n1 \\\\\n1\n\\end{array} \\right ) {\\left \\langle d, w \\right \\rangle} = \\frac 13 \\left ( \\begin{array}{c}\n-2 \\\\\n1 \\\\\n1\n\\end{array} \\right ).$$\nThis vector has norm $\\sqrt{2/3}$, which is therefore the distance of $L$ and $L'$.", "primary": ["classify-relative-position-of-lines", "compute-distance-between-affine-subspaces"], "secondary": ["compute-orthogonal-projection"]}, {"label": "ex:euclid-6-8", "displayLabel": "7.9", "statement": "Are the lines \n$$L: x = y-1=-z  \\text{ and } L' :x-2=-y=\\frac z2$$\nidentical, parallel, or skew?\nCompute their distance.", "solution": "This solution illustrates Task 7.71, Task 7.74.\n\nThe two lines have underlying vector spaces $W = L(\\left ( \\begin{array}{c}\n1 \\\\\n1 \\\\\n-1\n\\end{array} \\right ))$ and $W' = L(\\left ( \\begin{array}{c}\n1 \\\\\n-1 \\\\\n2\n\\end{array} \\right ))$ respectively.\nThese two one-dimensional subspaces are not contained in each other: the two vectors are linearly independent.\n\nThe general point in $L$ is of the form\n$$p(t) = \\left ( \\begin{array}{c}\n0 \\\\\n1 \\\\\n0\n\\end{array} \\right ) + t \\left ( \\begin{array}{c}\n1 \\\\\n1 \\\\\n-1\n\\end{array} \\right ),$$\nwhile those on $L'$ are of the form\n$$q(u) = \\left ( \\begin{array}{c}\n2 \\\\\n0 \\\\\n0\n\\end{array} \\right ) + u \\left ( \\begin{array}{c}\n1 \\\\\n-1 \\\\\n2\n\\end{array} \\right ).$$\nAccording to Proposition 7.45, we need to compute the values of $t, u \\in {\\bf R}$ such that the difference $p(t) - q(u) = \\left ( \\begin{array}{c}\nt-2-u \\\\\n1+t+u \\\\\n-t-2u\n\\end{array} \\right )$ is orthogonal on $W$ and also on $W'$.\nThis leads to the linear system\n\\begin{align*}\n0 & = {\\left \\langle \\left ( \\begin{array}{c}\n1 \\\\\n1 \\\\\n-1\n\\end{array} \\right ), \\left ( \\begin{array}{c}\n-t-2-u \\\\\n1+t+u \\\\\n-t-2u\n\\end{array} \\right ) \\right \\rangle} = t-2-u+1+t+u+t+2u=3t+2u-1, \\\\\n0 & = {\\left \\langle \\left ( \\begin{array}{c}\n1 \\\\\n-1 \\\\\n2\n\\end{array} \\right ), \\left ( \\begin{array}{c}\n-t-2-u \\\\\n1+t+u \\\\\n-t-2u\n\\end{array} \\right ) \\right \\rangle} = t-2-u-1-t-u-2t-4u=-2t-6u-3.\n\\end{align*}\nThe solution of this system is $t=\\frac 67$, $u = \\frac {-11}{14}$.\nOne then computes $p(6/7)-q(-11/14)=\\left ( \\begin{array}{c}\n-5/14 \\\\\n15/14 \\\\\n5/7\n\\end{array} \\right )$, \nwhose norm is equal to $\\frac5{\\sqrt{14}}$.\nThis is the distance between the two lines.\n\nIn particular, this distance is positive. This, together with the above observation that $W \\ne W'$ means that the lines are skew.\n(If one is only required to show that the lines are skew, without computing their distance, one can also solve the linear system given by the intersection of $L$ and $L'$; one finds out that this system has no solution, so the lines are skew.)", "primary": ["classify-relative-position-of-lines", "compute-distance-between-affine-subspaces"], "secondary": ["test-linear-independence", "perform-gaussian-elimination"]}, {"label": "ex:euclid-6-9", "displayLabel": "7.10", "statement": "Let $P$ be the plane given by the equation\n$$4x+5y+10z-20 = 0.$$\nLet $L$ be the line given by the equations $x = 0, y = 5 - z$.\n\\begin{enumerate}\n\\item Sketch $P$ and $L$.\n  \\item Compute the orthogonal complement of the underlying vector space $W$ of $P$.\n  \\item Compute the point of $P$ that is closest to the origin and its distance to the origin. \n\\item Are $P$ and $L$ parallel?\n\\end{enumerate}", "solution": "This solution illustrates Task 7.72.\n\nA useful way to sketch lines and planes is by considering some points on them where several coordinates are zero.\nIn the case of $P$, three such points are $(5,0,0), (0,4,0), (0,0,2)$, while for $L$ two such points are $(0,5,0), (0,0,5)$.\nThis leads to the following sketch:\n\n\\input{figures/src/solutions/solutions-fig-02.tikz}\n\nThe equation can be rewritten as\n$${\\left \\langle \\left ( \\begin{array}{c}\n4 \\\\\n5 \\\\\n10\n\\end{array} \\right ), \\left ( \\begin{array}{c}\nx \\\\\ny \\\\\nz\n\\end{array} \\right ) \\right \\rangle} = 20.$$\nAccording to Definition and Lemma 7.20, the underlying vector space $W$ is the orthogonal complement of the vector $\\left ( \\begin{array}{c}\n4 \\\\\n5 \\\\\n10\n\\end{array} \\right )$.\n\nThe line $L$ has as its underlying vector space $W' = L(\\left ( \\begin{array}{c}\n0 \\\\\n1 \\\\\n-1\n\\end{array} \\right ))$.\nIf $P$ and $L$ are parallel, then $W' \\subset W$. This means that $\\left ( \\begin{array}{c}\n0 \\\\\n1 \\\\\n-1\n\\end{array} \\right )$ is orthogonal to $\\left ( \\begin{array}{c}\n4 \\\\\n5 \\\\\n10\n\\end{array} \\right )$.\nTheir scalar product is $5-10 = -5 \\ne 0$, so that these vectors are \\emph{not} orthogonal and therefore $L$ and $P$ are not parallel.\n\nWe compute the distance of $P$ to the origin using\nProposition 7.47:\n$$d(0,P) = \\frac{20}{|\\hspace{-0.5mm}| {\\left ( \\begin{array}{c}\n4 \\\\\n5 \\\\\n10\n\\end{array} \\right )} |\\hspace{-0.5mm}|} = \\frac{20}{\\sqrt{141}}.$$ \nWe compute the closest point by determining the (unique) intersection point $P \\cap W^\\bot$.\nWe are thus seeking the real number $r$ such that $r \\left ( \\begin{array}{c}\n4 \\\\\n5 \\\\\n10\n\\end{array} \\right ) = \\left ( \\begin{array}{c}\n4r \\\\\n5r \\\\\n10r\n\\end{array} \\right )$ lies on the plane $P$, i.e., such that\n$${\\left \\langle \\left ( \\begin{array}{c}\n4 \\\\\n5 \\\\\n10\n\\end{array} \\right ), \\left ( \\begin{array}{c}\n4r \\\\\n5r \\\\\n10r\n\\end{array} \\right ) \\right \\rangle} = 20.$$\nThe left hand side equals $r(16+25+100) = 141 r$, so that $r = \\frac{20}{141}$, and therefore the point in $P$ that is as close as possible to the origin is \n$$\\frac{20}{141}\\left ( \\begin{array}{c}\n4 \\\\\n5 \\\\\n10\n\\end{array} \\right ).$$", "primary": ["compute-orthogonal-complement", "compute-distance-between-affine-subspaces", "check-line-parallel-to-plane"], "secondary": ["interpret-solutions-geometrically", "compute-orthogonal-projection"]}, {"label": "ex:euclid-6-10", "displayLabel": "7.11", "statement": "Which of the following matrices is orthogonally diagonalizable?\nIf so, find a orthonormal eigenbasis of ${\\bf R}^2$.\n\\begin{enumerate}\n  \\item $A = \\left ( \\begin{array}{cc}\n1 & 2 \\\\\n2 & 1\n\\end{array} \\right )$\n  \\item $A = \\left ( \\begin{array}{cc}\n1 & 2 \\\\\n-2 & 1\n\\end{array} \\right )$\n  \\item $A = \\left ( \\begin{array}{cc}\n0 & 0 \\\\\n0 & 0\n\\end{array} \\right )$.\n\\end{enumerate}", "solution": "We apply Theorem 7.38, according to which a matrix is \\emph{orthogonally} diagonalizable if and only if it is symmetric. This excludes $A = \\left ( \\begin{array}{cc}\n1 & 2 \\\\\n-2 & 1\n\\end{array} \\right )$.\nThe other two matrices are symmetric and therefore orthogonally diagonalizable.\nThe matrix $A = \\left ( \\begin{array}{cc}\n0 & 0 \\\\\n0 & 0\n\\end{array} \\right )$ is already a diagonal matrix, so for $P = {\\mathrm {id}}$ the matrix $PAP^{-1}$ is diagonal.\nThe standard basis vectors $e_1, e_2$ are an orthonormal eigenbasis.\n\nFor $A = \\left ( \\begin{array}{cc}\n1 & 2 \\\\\n2 & 1\n\\end{array} \\right )$, we compute the eigenvalues as was indicated after\nTheorem 7.38.\n\\begin{align*}\n\\lambda_{1/2} & = \\frac{a+d}2 \\pm \\sqrt{\\frac{(a-d)}4 + b^2} \\\\\n& = 1 \\pm 2.\n\\end{align*}\nThus the eigenvalues are $-1$ and $3$.\nWe compute the eigenspaces.\nThe matrix $A - (-1){\\mathrm {id}} = \\left ( \\begin{array}{cc}\n2 & 2 \\\\\n2 & 2\n\\end{array} \\right )$ has kernel given by $w_1 := e_1 - e_2$.\nThe matrix $A - 3 {\\mathrm {id}} = \\left ( \\begin{array}{cc}\n-2 & 2 \\\\\n2 & -2\n\\end{array} \\right )$ has kernel given by $w_2 := e_1 + e_2$.\nThese vectors are orthogonal:\n$${\\left \\langle e_1-e_2, e_1+e_2 \\right \\rangle} = {\\left \\langle \\left ( \\begin{array}{c}\n1 \\\\\n-1\n\\end{array} \\right ), \\left ( \\begin{array}{c}\n1 \\\\\n1\n\\end{array} \\right ) \\right \\rangle} = 0.$$\nHowever, they are not normal, so an orthonormal eigenbasis for $A$ is given by\n$$\\frac{w_1}{|\\hspace{-0.5mm}| {w_1} |\\hspace{-0.5mm}|} = \\frac{1}{\\sqrt 2} \\left ( \\begin{array}{c}\n1 \\\\\n-1\n\\end{array} \\right ) \\text{ and } \\frac{w_2}{|\\hspace{-0.5mm}| {w_2} |\\hspace{-0.5mm}|} = \\frac{1}{\\sqrt 2} \\left ( \\begin{array}{c}\n1 \\\\\n1\n\\end{array} \\right ).$$", "primary": ["decide-orthogonal-diagonalizability", "compute-eigenspace"], "secondary": ["compute-eigenvalues", "compute-orthonormal-basis"]}, {"label": "ex:euclid-6-11", "displayLabel": "7.12", "statement": "Let $A$ be a symmetric matrix and $\\lambda \\ne \\mu$ two \\emph{distinct} eigenvalues of $A$, with eigenvectors $v$ and $w$, respectively.\nThen $v \\bot w$, i.e., eigenvectors of \\emph{distinct} eigenvalues are orthogonal.", "solution": "If $Av = \\lambda v$, $Aw= \\lambda w$, we compute\n\\begin{align*}\n\\lambda {\\left \\langle v, w \\right \\rangle} & = {\\left \\langle \\lambda v, w \\right \\rangle} \\\\\n& = {\\left \\langle Av, w \\right \\rangle} \\\\\n& = (Av)^T w \\\\\n& = v^T A^T w \\\\\n& = v^T A w & \\text{ since }A = A^T \\\\\n& = {\\left \\langle v, Aw \\right \\rangle} \\\\\n& = {\\left \\langle v, \\mu w \\right \\rangle} \\\\\n& = \\mu {\\left \\langle v, w \\right \\rangle}.\n\\end{align*}\nSince $\\lambda \\ne \\mu$, this forces ${\\left \\langle v, w \\right \\rangle}=0$.", "primary": ["use-scalar-product-definition"], "secondary": ["decide-orthogonal-diagonalizability"]}, {"label": "ex:euclid-6-12", "displayLabel": "7.13", "statement": "Let $P \\subset {\\bf R}^4$ by the hyperplane given by\n$$2 x_1 + x_3 - x_4 = 4,$$\nwhere $(x_1, \\dots, x_4)$ are the coordinates of ${\\bf R}^4$.\nFor a parameter $t \\in {\\bf R}$, let $L_t$ be the line \n$$L_t = (1,0,0,-2t) + L(t, 1, 0, -1).$$\n\n\\begin{itemize}\n  \\item For which $t \\in {\\bf R}$ is $L_t$ parallel to $P$?\n  \\item Let now  $t = -\\frac 12$ and consider the line $L = L_{-\\frac 12}$.\n  Determine the pair(s) of points $(p, l)$ such that $p \\in P$ and $l \\in L$ such that their distance is minimal.\n\\end{itemize}", "solution": "This solution illustrates Task 7.72, Task 7.74.\n\nBy definition, the hyperplane $P$ is given by the equation\n$${\\left \\langle (2,0,1,-1)^T, (x_1, \\dots, x_4)^T \\right \\rangle} = 4.$$\nIn other words, the underlying sub-vector space $W \\subset {\\bf R}^4$ of that hyperplane is the subspace\n$${\\left \\langle (2,0,1,-1)^T, (x_1, \\dots, x_4)^T \\right \\rangle} = 0,$$\nor, what is the same, the orthogonal complement of $(2,0,1,-1)^T$.\n\nThe underlying subspace $W'_t$ of the line $L_t$ is spanned by $(t,1,0,-1)$.\nBy Definition 7.42, $P$ is parallel to $L_t$ if $W \\subset W'_t$ (which is impossible for dimension reasons) or if $W'_t \\subset W$.\nThe latter is equivalent to $(t,1,0,-1) \\in W$ or, yet equivalently, \n$${\\left \\langle (t,1,0,-1)^T, (2,0,1,-1)^T \\right \\rangle} = 0.$$\nThis equates to $2t + 1 = 0$ or $t = -\\frac12$.\n\nWe now compute the pair(s) of points realizing the minimal distance between $P$ and $L := L_{-\\frac12}$.\nWe will use that these are exactly the points $(p, l)$ such that $p-l \\bot W$ and $p-l \\bot W'$.\n\nThe point $l \\in L = L_{-\\frac12}$ is of the form \n\\begin{align*}\nl & = (1,0,0,1) + r(-\\frac 12, 1, 0, -1) \\\\\n& = (1-s, 2s, 0, 1-2s) & \\text{ with }s=\\frac r2.\n\\end{align*}\nOn the other hand a point $p =(x_1, \\dots, x_4) \\in P$ satisfies\n$$2 x_1 + x_3 - x_4 = 4,$$\nso we can take $x_1 = a$, $x_2 = b$ and $x_3=c$ as free parameters and get $x_4 = 2a+c-4$.\nThat is $p = (a,b,c,2a+c-4)$.\nTherefore \n$$p-l = (a+s-1,b-2s,c,2a+c+2s-5).$$\n\nNote that $a,b,c,s$ are the unknowns.\nWe now determine the values of these unknowns.\nThe orthogonal complement of $W$, $W^\\bot = (((2,0,1,-1)^T)^\\bot)^\\bot = L(2,0,1,-1).$\nHere we use that for a subspace $U \\subset {\\bf R}^n$, we have\n$$(U^\\bot)^\\bot = U.$$\n(Indeed, $U \\subset (U^\\bot)^\\bot$: for $u \\in U$ and $u' \\in U^\\bot$ we have ${\\left \\langle u, u' \\right \\rangle} = 0$, so that $u \\in (U^\\bot)^\\bot$. Both vector subspaces of ${\\bf R}^n$ have the same dimension, and therefore they agree.)\n\nThis means that we are looking for $a,b,c,s \\in {\\bf R}$ such that the following conditions are satisfied \n\\begin{itemize}\n\t\\item $p-l$ is a multiple of $(2,0,1,-1)$, say $\\lambda(2,0,1,-1) = (2\\lambda,0,\\lambda,-\\lambda)$.\nThis translates into a linear system\n\\begin{align*}\na+s-1 &= 2 \\lambda \\\\\nb-2s & = 0 \\\\\nc & = \\lambda \\\\\n2a+c+2s-5 & = - \\lambda.\n\\end{align*}\n\\item\nWe now spell out the condition that $p-l$ is orthogonal to $(-\\frac12, 1, 0, -1)^T$ or equivalently, to $(-1,2,0,-2)$: \n\\begin{align*}\n0 &= {\\left \\langle p-l, (-1,2,0,-2)^T \\right \\rangle}  \\\\\n& = -(a+s-1)+2(b-2s)-2(2a+c+2s-5) \\\\\n& = -5a + 2b -2c -9s + 11.\n\\end{align*}\nWe obtain a linear system in the 5 unknowns $a,b,c,s,\\lambda$:\n\\begin{align*}\na+s-2\\lambda & = 1\\\\\nb-2s & = 0\\\\\nc-\\lambda & = 0 \\\\\n2a+c+2s+\\lambda & = 5\\\\\n-5a + 2b -2c -9s & = - 11.\n\\end{align*}\nOne solves this using Gaussian eliminiation (or, using an appropriate computer algebra system, cf.~\\url{https://www.wolframalpha.com/input?i=Solve\nand obtains as solutions the vectors\n$$(a, b=4-2a, c=\\frac12, \\lambda=\\frac12, s=2-a).$$\nThus\n\\begin{align*}\np & = (a,4-2a,\\frac 12,2a-\\frac 72) \\\\\nl & = (1-(2-a), 2(2-a), 0, 1-2(2-a)) = (a-1, 4-2a,0,-3+2a).\n\\end{align*}\nThis implies that for \\emph{any} point $l \\in L$, there is a unique point $p \\in P$ such that $(p,l)$ realizes the minimal distance between $P$ and $L$.\n\\end{itemize}", "primary": ["check-line-parallel-to-plane", "compute-distance-between-affine-subspaces"], "secondary": ["case-split-on-parameter", "compute-orthogonal-complement", "perform-gaussian-elimination", "parametrize-solution-set"]}, {"label": "ex:euclid-lines-plane", "displayLabel": "7.14", "statement": "Let $L \\subset {\\bf R}^3$ be the line defined be the system\n\\begin{align*}\nx+z & = 1\\\\\ny+z & = -2.\n\\end{align*}\nLet $L'$ be the line in ${\\bf R}^3$ passing through the points $(0,0,1)$ and $(0,1,1)$.\n\n\\begin{itemize}\n   \\item Present $L$ as $L=v+W$ for a subspace $W \\subset {\\bf R}^3$. Do the same for $L'$.\n   \\item Are $L$ and $L'$ a) identical, b) parallel, c) skew or d) intersecting?\n   \\item Compute the Cartseian equation (i.e., in the  form $ax+by+cz=d$, for appropriate values of $a, \\dots, d$) of the plane $P \\subset {\\bf R}^3$ that contains $L$ and is parallel to $L'$.\n   \\item Let $l = (2,-1,-1) \\in L$. Compute a point $l' \\in L'$ such that the line passing through $l$ and $l'$ is parallel to the plane given by the equation $x+z-1=0$.\n \\end{itemize}", "solution": "This solution illustrates Task 7.64, Task 7.67, Task 7.69.\n\nFor $L$, solve the system\n\\begin{align*}\nx+z & = 1,\\\\\ny+z & = -2.\n\\end{align*}\nWith parameter $z=s$, we get\n$\nx=1-s$, $y=-2-s$,\nhence\n$$\nL=(1,-2,0)+L(-1,-1,1).\n$$\nSo we can take\n$$\nv=(1,-2,0),\\qquad W=L(-1,-1,1).\n$$\n\nFor $L'$, from the two given points we get\n$$\nL'=(0,0,1)+L(0,1,0).\n$$\n\nTo classify the relative position (Definition 7.42), compare direction spaces:\n$$\nW=L(-1,-1,1),\\qquad W'=L(0,1,0).\n$$\nThese are different 1-dimensional subspaces, so $L$ and $L'$ are neither identical nor parallel.\nNow solve for an intersection:\n$$\n(1-s,-2-s,s)=(0,t,1).\n$$\nFrom $x=0$ we get $s=1$, then $z=1$ is satisfied, and $y=t$ gives $t=-3$.\nTherefore\n$$\nL\\cap L'=\\{(0,-3,1)\\},\n$$\nso the two lines are \\emph{intersecting}.\n\nLet $P$ be the plane containing $L$ and parallel to $L'$. Then $P$ is spanned by the two direction vectors\n$$\nd_1=(-1,-1,1),\\qquad d_2=(0,1,0).\n$$\nA normal vector can be computed by using the cross product (or by computing the orthogonal complement):\n$$\nd_1\\times d_2=(-1,0,-1),\n$$\nthus $n=(1,0,1)$ is a normal vector.\nUsing the point $(1,-2,0)\\in L$, the Cartesian equation of the plane (Proposition 7.48) is\n$$\nn\\cdot\\big((x,y,z)-(1,-2,0)\\big)=0\n\\iff x+z=1.\n$$\nSo one valid equation of $P$ is\n$$\nx+z-1=0.\n$$\n\nNow fix $l=(2,-1,-1)\\in L$ and seek $l'\\in L'$ such that the line through $l$ and $l'$ is parallel to the plane $x+z-1=0$.\nWrite\n$$\nl'=(0,r,1),\\qquad d=l'-l=(-2,r+1,2).\n$$\nThe line is parallel to the plane iff $d\\cdot (1,0,1)=0$, and indeed\n$$\n(-2,r+1,2)\\cdot(1,0,1)=-2+2=0\n$$\nfor every $r\\in{\\bf R}$.\nHence every point of $L'$ works:\n$$\nl'=(0,r,1),\\quad r\\in{\\bf R}.\n$$\nFor example, one can take $l'=(0,0,1)$.", "primary": ["convert-between-cartesian-and-parametric-form", "classify-relative-position-of-lines", "construct-plane-and-find-equation"], "secondary": ["check-line-parallel-to-plane"]}, {"label": "ex:euclid-poly-operator", "displayLabel": "7.15", "statement": "Let $V = P_{\\le 2}$ be the vector space of polynomials of degree $\\le 2$.\nWe write elements of $V$ as $p(t)=a+bt+ct^2$, where $a,b,c\\in{\\bf R}$.\nDefine \n$${\\left \\langle p, q \\right \\rangle} := \\int_{-1}^1 p(t) q(t) dt.$$\n\\begin{itemize}\n  \\item Confirm that ${\\left \\langle -, - \\right \\rangle}$ is a scalar product on $V$.\n  \\item Compute an orthonormal basis of $V$.\n  \\item Consider the map \n  $$f : V \\to V, f(p) := t \\frac{\\partial p}{\\partial t}$$ \n  (i.e., it maps a polynomial $p$ to the product of the indeterminate $t$ with the derivative of $p$ with respect to the variable $t$).\n  Confirm that this map is linear.\n  Compute the matrix of $f$ with respect to the standard basis $e_1 = 1$, $e_2 = t$ and $e_3 = t^2$. Is this basis an eigenbasis for $f$?\n  Compute $\\dim \\ker f$ and $\\dim {\\operatorname{im}\\ } f$.\n  \\item Does the map $f$ have an orthonormal eigenbasis? \n\\end{itemize}", "solution": "Let $V=P_{\\le 2}$ and ${\\left \\langle p,q \\right \\rangle}=\\int_{-1}^1 p(t)q(t)\\,dt$.\n\nFirst, ${\\left \\langle -, - \\right \\rangle}$ is a scalar product: bilinearity and symmetry follow from properties of the integral, and for $p\\neq 0$ we have ${\\left \\langle p,p \\right \\rangle}=\\int_{-1}^1 p(t)^2dt>0$.\n\nAn orthonormal basis is the same as in the previous polynomial exercise (see Example 7.16(3) and Gram--Schmidt in Proposition 7.32):\n$w_1=\\frac1{\\sqrt2}$, $w_2=\\sqrt{\\frac32}\\,t$, $w_3=\\frac{\\sqrt{10}}4(3t^2-1)$.\n\nNow consider $f:V\\to V$, $f(p)=t\\,p'$. It is linear because derivative and multiplication by $t$ are linear maps. In more detail, the conditions in Definition 4.1 are satisfied, for example $f(p_1 + p_2) = t(p_1+p_2)' = t(p_1'+p_2') = f(p_1) + f(p_2)$ and similarly for $f(a p)$ with $a \\in \\mathbf R$.\nFor the standard basis $e_1=1$, $e_2=t$, $e_3=t^2$ we have\n$f(e_1)=0$, $f(e_2)=t=e_2$, $f(e_3)=2t^2=2e_3$.\nHence\n$$\n\\mathrm M_{f, (e_1,e_2,e_3)}=\\left(\\begin{array}{ccc}\n0&0&0\\\\\n0&1&0\\\\\n0&0&2\n\\end{array}\\right).\n$$\nSo $(e_1,e_2,e_3)$ is an eigenbasis, with eigenvalues $0,1,2$.\n\nFrom the above, $\\ker f=L(1)$, so $\\dim\\ker f=1$; and ${\\operatorname{im}\\,}f=L(t,t^2)$, so $\\dim{\\operatorname{im}\\,}f=2$.\n\nFinally, $f$ has no orthonormal eigenbasis for this scalar product: the eigenspaces for $0,1,2$ are $L(1)$, $L(t)$, $L(t^2)$. These are all 1-dimensional, so any eigenbasis is (up to scaling) $(1,t,t^2)$. But ${\\left \\langle 1,t^2 \\right \\rangle}=\\int_{-1}^1 t^2dt=\\frac23\\neq 0$, so eigenvectors for $\\lambda=0$ and $\\lambda=2$ cannot be orthogonal.", "primary": ["use-scalar-product-definition", "compute-orthonormal-basis", "build-matrix-of-linear-map", "decide-orthogonal-diagonalizability"], "secondary": ["use-definition-of-linear-map", "compute-kernel-of-linear-map", "compute-image-of-linear-map", "recognize-eigenvector", "compute-eigenspace"]}, {"label": "ex:euclid-u-r4-orth", "displayLabel": "7.16", "statement": "Consider the subspace $U \\subset{\\bf R}^4$ given by the solutions of the equation\n$$x_1-x_2+x_3+2x_4 = 0.$$\n(As usual $x_1, \\dots, x_4$ are the coordinates of ${\\bf R}^4$.)\n\\begin{enumerate}\n  \\item Find a basis of $U$. What is $\\dim U$?\n  \\item Compute an orthonormal basis of $U$.\n  \\item Compute the orthogonal projection of $v=(2,3,0,0)$ and of $w=(2,5,3,0)$ onto $U$.\n  \\item Compute $U^\\bot$.\n\\end{enumerate}", "solution": "This solution illustrates Task 7.61, Task 7.62, Task 7.63.\n\nLet\n$$\nU=\\{x\\in{\\bf R}^4\\mid x_1-x_2+x_3+2x_4=0\\}.\n$$\nWriting $x_2=a$, $x_3=b$, $x_4=c$, we get $x_1=a-b-2c$, so\n$U=L(u_1,u_2,u_3)$ with\n$u_1=(1,1,0,0)$, $u_2=(-1,0,1,0)$, $u_3=(-2,0,0,1)$.\nHence $\\dim U=3$.\n\nFor an orthonormal basis, choose three pairwise orthogonal vectors in $U$:\n$v_1=(1,1,0,0)$,\n$v_2=(0,0,-2,1)$,\n$v_3=(-5,5,2,4)$.\nIn terms of the basis vectors $u_1,u_2,u_3$ above, these are\n$$\nv_1=u_1,\n\\qquad\nv_2=-2u_2+u_3,\n\\qquad\nv_3=5u_1+2u_2+4u_3.\n$$\nOne checks $v_i\\in U$ and ${\\left \\langle v_i,v_j \\right \\rangle}=0$ for $i\\neq j$.\n(Such vectors can be found using Gram--Schmidt orthogonalization, Proposition 7.32).\nTheir norms are $|v_1|=\\sqrt2$, $|v_2|=\\sqrt5$, $|v_3|=\\sqrt{70}$, so an orthonormal basis is\n$$\nw_1=\\frac1{\\sqrt2}(1,1,0,0),\\quad\nw_2=\\frac1{\\sqrt5}(0,0,-2,1),\\quad\nw_3=\\frac1{\\sqrt{70}}(-5,5,2,4).\n$$\n\nLet $n=(1,-1,1,2)$. Then $U=n^\\bot$, hence (Theorem 7.24)\n$p_U(x)=x-\\frac{{\\left \\langle x,n \\right \\rangle}}{{\\left \\langle n,n \\right \\rangle}}n$ and ${\\left \\langle n,n \\right \\rangle}=7$.\nFor $v=(2,3,0,0)$, ${\\left \\langle v,n \\right \\rangle}=-1$, so\n$p_U(v)=v+\\frac17 n=(\\frac{15}7,\\frac{20}7,\\frac17,\\frac27)$.\nFor $w=(2,5,3,0)$, ${\\left \\langle w,n \\right \\rangle}=0$, so $p_U(w)=w=(2,5,3,0)$.\n\nFinally, $U^\\bot=L(n)=L(1,-1,1,2)$, where we have used Corollary 7.31.", "primary": ["compute-orthonormal-basis", "compute-orthogonal-projection", "compute-orthogonal-complement"], "secondary": ["find-basis-and-dimension", "parametrize-solution-set"]}, {"label": "ex:euclid-6-13", "displayLabel": "7.17", "statement": "In the Euclidean space ${\\bf R}^4$, endowed with the standard scalar product, let $U$ be the subspace spanned by the vectors\n$u_1 = (1,2,0,-1)$, $u_2 = (0,-4,3,4)$.\n\\begin{enumerate}\n  \\item Compute an orthogonal basis of $U$.\n\\item Compute a basis of $U^\\perp$.\n\\item Compute the orthogonal projection of $v = (0,5,3,4)$ onto $U$.\n\\item Let $w = (2,-1,0,2)$. Decide whether there is a subspace $L \\subset {\\bf R}^4$ such that the orthogonal projection of $w$ onto $L$ is the vector $\\ell = (1,1,2,0)$.\n\\end{enumerate}", "solution": "This solution illustrates Task 7.61, Task 7.63, Task 7.62.\n\nWe compute in fact directly an ortho\\emph{normal} basis, which in particular is then orthogonal. (The property of also being normal is convenient further below.)\nWe apply the Gram--Schmidt procedure (Proposition 7.32):\n\\begin{align*}\nw_1 & = \\frac 1{\\sqrt 6} (1,2,0,-1), \\\\\nw_2' & = (0,-4,3,4) - {\\left \\langle (0,-4,3,4), \\frac 1 {\\sqrt 6}(1,2,0,-1) \\right \\rangle} \\frac 1 {\\sqrt{6}} (1,2,0,-1) \\\\\n& = (0,-4,3,4) + 2(1,2,0,-1) \\\\\n& = (2,0,3,2), \\\\\nw_2 & = \\frac 1{\\sqrt {17}} (2,0,3,2).\n\\end{align*}\nThe vectors $w_1$ and $w_2$ then constitute an orthonormal basis of $U$.\n\nWe compute the orthogonal complement of $U$ by solving the equations (for some $v \\in {\\bf R}^4$)\n\\begin{align*}\n{\\left \\langle v, (1,2,0,-1) \\right \\rangle} & = 0 \\\\\n{\\left \\langle v, (0,-4,3,4 \\right \\rangle} & = 0.\n\\end{align*}\nWe consider the matrix of the resulting linear system, and bring it into row echelon form:\n$$\\left ( \\begin{array}{cccc}\n1 & 2 & 0 & -1 \\\\\n0 & -4 & 3 & 4\n\\end{array} \\right ) \\leadsto \\left ( \\begin{array}{cccc}\n1 & 2 & 0 & -1 \\\\\n0 & 1 & -\\frac 34 & 1\n\\end{array} \\right ) \\leadsto \\left ( \\begin{array}{cccc}\n1 & 0 & \\frac 32 & 1 \\\\\n0 & 1 & -\\frac 34 & 1\n\\end{array} \\right ).$$\nThus, if $v = (x_1, \\dots, x_4)$, then $x_3$ and $x_4$ are free variables, so that a basis of $U^\\bot$ is given by the two vectors\n$(-\\frac 32, \\frac 34, 1, 0)$ and $(-1,1,0,1)$.\n\nWe compute the orthogonal projection by Theorem 7.24:\n\\begin{align*}\np_U(v) & = {\\left \\langle v, w_1 \\right \\rangle} w_1 + {\\left \\langle v, w_2 \\right \\rangle} w_2 \\\\\n& = (3,2,3,1).\n\\end{align*}\n\nIf we write $w = l + l^\\bot$ with $l^\\bot \\in L^\\bot$, then $l^\\bot = w - l = (2,-,1,0,2)-(1,1,2,0)=(1,-2,-2,2)$.\nThis vector would need to be orthogonal to $(1,1,2,0)$, which however it is not (since their scalar product is $-5 \\ne 0$).\nTherefore, such a subspace $L$ does not exist.\n\nThese computations may be carried out also using a computer algebra system, for example the Gram--Schmidt orthogonalization procedure like so: \\url{https://www.wolframalpha.com/input?i=Orthogonalize", "primary": ["compute-orthonormal-basis", "compute-orthogonal-complement", "compute-orthogonal-projection", "decide-existence-of-projection-subspace"], "secondary": ["perform-gaussian-elimination"]}, {"label": "ex:euclid-6-14", "displayLabel": "7.18", "statement": "Consider the following two lines in ${\\bf R}^3$, where $x, y, z$ are the coordinates:\n$$\nL: \\left\\{\\begin{aligned}\n& x + y - 1 = 0\\\\\n& 2x - z - 1 = 0\n\\end{aligned}\\right. \\qquad\nM: \\left\\{\\begin{aligned}\n& x - 2y - 1 = 0\\\\\n& y - z + 2 = 0\n\\end{aligned}\\right.\n$$\n\\begin{enumerate}\n\\item Determine whether $L$ and $M$ are the same line, parallel, or skew.\n\\item Compute the cartesian equation of the plane that contains the line $M$ and that is parallel to $L$. (Recall that a cartesian equation is of the form $\\langle x, a \\rangle = d$ for an appropriate vector $a$ and an appropriate $d \\in {\\bf R}$.) \n\\item  Given the point $l = (0,1,-1) \\in L$ compute a point $m \\in M$ such that the line passing through $l$ and $m$ is parallel to the plane defined by the equation $3x - z = 0$.\n\\item Consider the family of planes $\\pi_\\alpha: z = \\alpha$, for some parameter $\\alpha \\in {\\bf R}$.\nLet $r_\\alpha = L \\cap \\pi_\\alpha$ and $s_\\alpha = M \\cap \\pi_\\alpha$.\nLet $m_\\alpha$ be the midpoint of the segment with endpoints $r_\\alpha$ and $s_\\alpha$.\nVerify that the points $m_\\alpha$ are all lying on the same line. Moreover, determine the parametric equation of that line.\n\\end{enumerate}", "solution": "This solution illustrates Task 7.71, Task 7.72.\n\nWe first compute $L$ in the form $L = v_0 + W$.\nWe choose $v_0 = (0,1,-1)$. In addition, the point $(1,2,1)$ is also lying in $L$.\nTherefore $W$ is spanned by $(1,2,1)-(0,1,-1)=(1,1,2)$.\n\nSimilarly, we can compute $M = (1,-2,0) + L((2,1,1))$.\nThe two vectors $(1,1,2)$ and $(2,1,1)$ are linearly independent, so that $L$ and $M$ are not parallel nor identical.\nWe compute the intersection $L \\cap M$. We have the equations $1-y = x = 2y+1$, so that $y = 0$. We also have $2x-1 = z = y+2$, so that $z=2$ and $x = \\frac 32$, but then we get a contradiction to $1-y=x$. Thus $L \\cap M = \\emptyset$.\nTherefore, $L$ is skew to $M$.\n\nWe compute the requested plane $P$ by observing that its underlying vector space $W$ is spanned by $(1,-1,2)$ and $(2,1,1)$.\nMoreover, the point $(1,0,2) \\in P$.\nThus $P = (1,0,2) + L((1,-1,2), (2,1,1))$.\nThe orthogonal complement of $W$ is spanned by $(1,-1,-1)$, as one sees by solving the linear system $a-b+2c = 0, 2a+b+c=0$.\nThus, $P$ is of the form \n$${\\left \\langle v, (1,-1,-1) \\right \\rangle} = d.$$\nTo compute the number $d$, we use that $(1,0,2) \\in P$, so that $d = {\\left \\langle (1,0,2), (1,-1,-1) \\right \\rangle} = -1$.\n\nA general point on $M$ is of the form $(1+2r,r,2+r)$. With $l =(0,1,-1)$, the vector $v := m-l = (1+2r, r-1,3+r)$. The line spanned by this vector is parallel to the plane defined by the equation $3x-z = 0$ precisely if ${\\left \\langle v, (3,0,-1) \\right \\rangle} = 0$. This leads to the equation\n$$3+6r-3-r = 0,$$\ni.e., $r = 0$, so that $m = (1,0,2)$.\n\nWe compute the coordinates of $r_\\alpha = (x,y,z)$ as $z = \\alpha$, $x = \\frac 12(1+\\alpha)$, $y = \\frac 12(1-\\alpha)$.\nSimilarly, $s_\\alpha = (2\\alpha - 3, \\alpha - 2, \\alpha)$.\nThe midpoints $m_\\alpha = \\frac{r_\\alpha + s_\\alpha}2 = (\\frac{5\\alpha-5}4, \\frac{\\alpha-3}4,\\alpha)$ are precisely the points on the line\n$$(-\\frac 54, -\\frac 34, 0) + L((\\frac 54, \\frac 14, 1)).$$", "primary": ["classify-relative-position-of-lines", "construct-plane-and-find-equation", "check-line-parallel-to-plane"], "secondary": ["convert-between-cartesian-and-parametric-form", "test-linear-independence", "parametrize-solution-set"]}, {"label": "ex:euclid-6-15", "displayLabel": "7.19", "statement": "Consider the points $p = (3,1,0)$, $q = (0,1,3)$ and $r = (-3,0,-3) \\in {\\bf R}^3$. \nLet $L$ be the line passing through $p$ and $q$. \n\\begin{enumerate}\n  \\item \nDetermine the parametric equation of $L$, i.e., express $L$ in the form $L = v + W$, for an appropriate vector $v \\in {\\bf R}^3$ and a subspace $W \\subset {\\bf R}^3$. \n\\item\nVerify that $r$ does not lie on $L$.\nGive the plane $P$ containing $p, q, r$ both in vector and in cartesian form.\n\\end{enumerate}", "solution": "This solution illustrates Task 7.66, Task 7.69.\n\nWe have $L = p + L(q-p)$, i.e., $L = (3,1,0) + L(-3,0,3)$.\n(Other solutions are possible as well, e.g., $L = q + L(-3,0,3)$.)\nWe determine whether $r$ lies on $L$ by considering the linear system\n\\begin{align*}\n3-3t & = -3 \\\\\n1 & = 0 \\\\\n3t & = -3.\n\\end{align*}\nThe second equation is a contradiction, therefore there is no $t \\in {\\bf R}$ satisfying this linear system. Thus $r \\notin L$.\n\nWe describe the plane $P$ containing the points $p, q, r$ in two ways:\n$$P = p + L(q-p, r-p) = (3,1,0) + L((-3,0,3), (-6,-1,-3)).$$\nThe orthogonal complement of $w_1 = (-3,0,3)$ and $w_2 = (-6,-1,-3)$ is the line spanned by $a := (1,-9,1)$.\nThus\n$$P = \\{x \\in {\\bf R}^3 | {\\left \\langle x, a \\right \\rangle} = {\\left \\langle p, a \\right \\rangle}\\}$$\nwhich we can write out as\n$$P = \\{x \\in {\\bf R}^3 | {\\left \\langle x, \\left ( \\begin{array}{c}\n1 \\\\\n-9 \\\\\n1\n\\end{array} \\right ) \\right \\rangle} = -6\\}$$\nor, equivalently\n$$ P = \\{x = (x_1, x_2, x_3) | x_1 -9x_2 + x_3 = -6\\}.$$", "primary": ["convert-between-cartesian-and-parametric-form", "construct-plane-and-find-equation"], "secondary": ["test-vector-is-solution"]}, {"label": "ex:euclid-6-16", "displayLabel": "7.20", "statement": "Consider the line $L = (3,1,0) + L(1,0,-1)$.\nIs there a plane containing $L$ and the line $M$ given by the systen $x + z = 2$, $x - 2 y = 2$ (with $x, y, z$ being the coordinates of ${\\bf R}^3$)?", "solution": "This solution illustrates Task 7.71.\nThe line $M$, given to us by the systen $x + z = 2$, $x - 2 y = 2$ is also described as $M = (2,0,0) + L(2, 1, -2)$. Its underlying vector space is therefore spanned by $(2,1,-2)$, while the underlying vector space of $L$ is spanned by $(1,0,-1)$.\nThese two vectors are linearly independent.\nWe compute the intersection of $L$ and $M$ by taking a general point $l = (3+t, 1, -t) \\in L $ and $m = (2+2s,s,-2s) \\in M$, with $t, s \\in {\\bf R}$.\nThe three coordinates of the equation $l = m$ read:\n\\begin{align*}\n3+t &= 2+2s \\\\\n1 & = s \\\\\n-t & = -2s.\n\\end{align*}\nThe second and third equations give $s = 1$, $t = 2$. The first then gives $5 = 4$, which is a contradiction.\nThus, there is no point lying on $L$ and on $M$, i.e., $L \\cap M = \\emptyset$.\nThus $L$ and $M$ are skew, so no plane contains $L$ and $M$.", "primary": ["classify-relative-position-of-lines"], "secondary": ["test-linear-independence"]}, {"label": "ex:euclid-6-17", "displayLabel": "7.21", "statement": "Consider the line $L = (3,1,0) + L(1,0,-1)$.\nLet $p = (-1,-1,-1)$.\nDescribe all the points $q \\in {\\bf R}^3$ such that the line $M$ passing through $p$ and $q$ intersects $L$ orthogonally (i.e., intersects it, and does so orthogonally).", "solution": "Writing $q = (x,y,z)$ for $x, y, z \\in {\\bf R}$, the line $M$ is then given by $M = p + L(q-p) = (-1,-1,-1) + L(x+1,y+1,z+1)$.\n\nThe line $M$ will be orthogonal to $L$ precisely if\n$$(x+1, y+1, z+1) \\bot (1,0,-1),$$\ni.e., if $x+1 - z - 1 = 0$, i.e., if $x = z$.\n\nAs in the solution of Exercise 7.20 above, the line $M$ (with $x = z$) intersects $L$ precisely if the linear system\n\\begin{align*}\n3+t &= -1 + s(x+1) \\\\\n1 & = -1 + s(y+1) \\\\\n-t & = -1 + s(x+1) \\\\\n\\end{align*}\nhas a solution $(s,t) \\in {\\bf R}^2$.\nTo get a clearer view of this, we write down the augmented matrix for this linear system, keeping in mind that $x,y$ are parameters in this linear system, and $s, t$ are the unknowns.\nNote this is a linear system in two unknowns, but three equations.\n\\begin{align*}\n\\left ( \\begin{array}{cc|c}\n-x-1 & 1 & -4 \\\\\n-y-1 & 0 & -2 \\\\\n-x-1 & -1 & -1\n\\end{array} \\right ) & \\leadsto \\left ( \\begin{array}{cc|c}\n-x-1 & 1 & -4 \\\\\n-y-1 & 0 & -2 \\\\\n-2x-2 & 0 & -5\n\\end{array} \\right ) \\\\\n& \\stackrel{\\text{if } y \\ne -1} \\leadsto \\left ( \\begin{array}{cc|c}\n-x-1 & 1 & -4 \\\\\n1 & 0 & \\frac{2}{y+1} \\\\\n-2x-2 & 0 & -5\n\\end{array} \\right ) \\\\\n& \\leadsto \\left ( \\begin{array}{cc|c}\n0 & 1 & -4+2\\frac{x+1}{y+1} \\\\\n1 & 0 & \\frac{2}{y+1} \\\\\n0 & 0 & -5+2\\frac{2x+2}{y+1}\n\\end{array} \\right ).\n\\end{align*}\nIf $y = -1$, then we have no solution in the above system, due to the row $0 \\ 0 \\ | \\  {-2}$ in this case.\nOtherwise, for $y \\ne -1$, we can perform the elementary row operations as indicated above.\nThis system has \\emph{no} solution if the term $-5+2\\frac{2x+2}{y+1} \\ne 0$.\nIf, on the contrary, the bottom right entry is zero, then the system does have a unique solution (since we then have two leading ones in the matrix).\nThis bottom right entry is zero precisely if $5(y+1) = 4x+4$, or, equivalently, if $y = \\frac{4x -1}5$.\n\nWe therefore find that \nthe line $M$ through $p$ and $q = (x,y,z)$ intersects $L$ orthogonally precisely if $z = x$, $y = \\frac{4x -1}5$ and $y \\ne -1$.", "primary": ["construct-line-orthogonal-to-line"], "secondary": ["case-split-on-parameter", "perform-gaussian-elimination", "parametrize-solution-set"]}, {"label": "ex:euclid-6-18", "displayLabel": "7.22", "statement": "Consider the plane $P = \\{x \\in {\\bf R}^3, 3x - 4y+z = 2\\}$ and the point $p = (0,1,6) \\in P$, as well as the line $L = (0,0,2) + L(1, 1, 1) \\subset P$, compute the line $M \\subset P$ that is orthogonal to $L$ and contains the point $p$.", "solution": "This solution illustrates Task 7.68.\n\nAny line $M$ passing through $p$ is of the form $M = p + L(w)$.\nWe compute $w = (a,b,c)$ by considering the two conditions on $M$:\n\\begin{itemize}\n \t\\item $M \\bot L$ holds exactly if $w \\bot (1,1,1)$, i.e., if $a+b+c=0$.\n \t\\item $M \\subset P$ holds exactly if $w \\bot (3,-4,1)$. Indeed, the underlying subspace of $P$ is given by $3x-4y+z=0$, i.e., it is the orthogonal complement of $(3,-4,1)$. That is, $3a-4b+c=0$.\n \\end{itemize}\nWe have to solve the homogeneous linear system associated to the matrix\n$$\\left ( \\begin{array}{ccc}\n1 & 1 & 1 \\\\\n3 & -4 & 1\n\\end{array} \\right )\n\\leadsto \n\\left ( \\begin{array}{ccc}\n1 & 1 & 1 \\\\\n0 & -7 & -2\n\\end{array} \\right )\n$$\nso a solution is given by $b = 2$, $c = -7$ and $a = 5$. (Any other non-zero multiple of $(5,2,-7)$ is also a solution.)\nTherefore\n$$M = p + L(w) = (0,1,6) + L(5,2,-7).$$", "primary": ["construct-line-orthogonal-to-line"], "secondary": ["compute-orthogonal-complement", "perform-gaussian-elimination"]}, {"label": "ex:euclid-6-19", "displayLabel": "7.23", "statement": "Consider the lines (in ${\\bf R}^3$)\n\\begin{align*}\nL_1 : \\ & 2x-y=-3 \\\\ & y+z=-2\n\\end{align*}\nand\n\\begin{align*}\nL_2 : \\ & x=t \\\\ & y = 2 \\\\ & z = 4-t, t \\in {\\bf R}.\n\\end{align*}\n\\begin{enumerate}\n  \\item Determine their relative position (skew, parallel etc.)\n  \\item Find the plane $\\pi$ parallel to $L_1$ and containing $L_2$.\n  \\item\n  Compute the distance between $\\pi$ and $L_1$.\n  \\item\n  Find points $p_1 \\in L_1$, $p_2 \\in L_2$ such that\n  $$|\\hspace{-0.5mm}| {p_1-p_2} |\\hspace{-0.5mm}| = d(p_1, p_2) = d(L_1, L_2),$$\n  i.e., two points that realize the minimal distance between $L_1$ and $L_2$. \n\\end{enumerate}", "solution": "This solution illustrates Task 7.71, Task 7.72, Task 7.74.\n\nThe cartesian equations of the line $L_2$ are obtained by inserting $x = t$ into the equation for $z$, which gives\n\\begin{align*}\ny & = 2 \\\\\nx+z & = 4.\n\\end{align*}\nWe compute the intersection of $L_1$ and $L_2$, and at the same time determine whether they are parallel or not.\nThe linear system for $L_1 \\cap L_2$ is (the first two equations are for $L_2$, the latter two for $L_1$)\n\\begin{align*}\ny & = 2 \\\\\nx+z & = 4\\\\\n2x-y & = -3\\\\\ny+z & = -2.\n\\end{align*}\nWe form the augmented matrix of this linear system and bring it into row echelon form:\n\\begin{align*}\n\\left ( \\begin{array}{ccc|c}\n1 & 0 & 1 & 4 \\\\\n0 & 1 & 0 & 2 \\\\\n2 & -1 & 0 & -3 \\\\\n0 & 1 & 1 & -2\n\\end{array} \\right )\n& \\leadsto\n\\left ( \\begin{array}{ccc|c}\n1 & 0 & 1 & 4 \\\\\n0 & 1 & 0 & 2 \\\\\n0 & -1 & -2 & -11 \\\\\n0 & 1 & 1 & -2\n\\end{array} \\right )\n\\leadsto\n\\left ( \\begin{array}{ccc|c}\n1 & 0 & 1 & 4 \\\\\n0 & 1 & 0 & 2 \\\\\n0 & 0 & -2 & -9 \\\\\n0 & 0 & 1 & -4\n\\end{array} \\right ) \\\\\n& \\leadsto\n\\left ( \\begin{array}{ccc|c}\n1 & 0 & 1 & 4 \\\\\n0 & 1 & 0 & 2 \\\\\n0 & 0 & -2 & -9 \\\\\n0 & 0 & 0 & -17\n\\end{array} \\right ).\n\\end{align*}\nIf we only consider the first three columns (corresponding to the three variables), the matrix has rank 3. This shows that the lines are not parallel (otherwise the rank would be 2). The full matrix has rank 4. Therefore there is no solution of the linear system and the lines are skew.\n\nPart (2): The plane $\\pi$ contains $L_2$ and the direction of $L_1$ (i.e., the underlying sub-vector space) is contained in the directions of $\\pi$ (i.e., its underlying sub-vector space).\nWe therefore first compute the direction of $L_1$.\nThe system\n\\begin{align*}\nL_1 : \\ & 2x-y=-3 \\\\ & y+z=-2\n\\end{align*}\nleads to $y = 2x+3$, $z=-y-2=-2x-5$, in which $x$ is a free variable.\nThus\n\\begin{align}\nL_1 & = \\{ (x, 2x+3,-2x-5) | x \\in {\\bf R} \\} \\nonumber \\\\\n\t& = \\{(0,3,-5) + x (1,2,-2) | x \\in {\\bf R} \\} \n\\end{align}\nThus the direction of $L_1$ is $(1,2,-2)$.\n(Alternatively, one may observe that the points $p = (0,3,-5)$ and $q = (1,5,-7)$ satisfy the linear system describing $L_1$, so that $L_1 = (0,3,-5) + L(q-p)$.)\n\nThe plane $\\pi$ is of the form $\\pi = \\{v = (x,y,z) \\in {\\bf R}^3 | {\\left \\langle v, a \\right \\rangle} = d\\}$ for some vector $a = (a_1, a_2, a_3)$ and $d \\in {\\bf R}$.\nI.e., $\\pi = \\{(x,y,z) | a_1 x+a_2 y + a_3z = d\\}$.\nIts underlying subvector space is $a_1 x + a_2 +a_3z=0$.\nThe condition $L_1$ being parallel to $\\pi$ translates into ${\\left \\langle a, v_1 \\right \\rangle} = 0$, where $v_1 = (1,2,-2)$ is the direction of $L_1$.\nThe condition $L_2 \\subset \\pi$ translates into ${\\left \\langle a, v_2 \\right \\rangle} = 0$, where $v_2 = (1,0,-1)$ is the direction vector of $L_2$ (cf.~Definition 7.50).\nThese two conditions give the linear system\n\\begin{align*}\na_1 + 2a_2 - 2a_3 & = 0\\\\\na_1 - a_3 & = 0.\n\\end{align*}\nThus $a_1 = a_3$ and $a_1 = 2a_2$, and $a_2$ (say) is a free variable. We choose $a_2 = 1$ (note: any other non-zero number $a_2$ would eventually give rise to the same plane $\\pi$ below), so that $a = (a_1, a_2, a_3) = (2,1,2).$\nThus, $\\pi = \\{(x,y,z) | 2x+y+2z=d \\}$, where we still need to compute $d$.\nIt is enough to choose $d$ such that $\\pi$ contains any point of $L_2$, for example $e := (0,2,4)$. We compute ${\\left \\langle a, e \\right \\rangle} = 2 \\cdot 0 + 1 \\cdot 2 + 2 \\cdot 4 = 10$. Thus, $d=10$, so that\n$$\\pi = \\{(x,y,z) | 2x+y+2z = 10 \\}.$$\n\nPart (3): By construction $L_1$ is parallel to $\\pi$, so to compute the distance of $\\pi$ and $L_1$, we may choose any point $q \\in L_1$ and to compute its orthogonal projection onto $\\pi$, which we call $r$. Then $d(\\pi, L_1) = d(q, r)$.\n\nThe line passing through $q$ and $r$ is orthogonal to $\\pi$, so it has direction vector $(2,1,2)$.\nWe choose $q = (0,3,-5)$. The line passing through $q$ and orthogonal to $\\pi$ is then of the form\n$$M = (0,3,-5) + L(2,1,2),$$\nits points are of the form $r_t = (2t,3+t,-5+2t)$ where $t \\in {\\bf R}$. The intersection of that line with $\\pi$ is given by the unique value of $t$ such that $r_t \\in \\pi$, i.e.,\n$$2 (2t)+(3+t)+2(-5-2t) = 10.$$\nThis simplifies to $9t=17$ or $t = \\frac{17}9$.\nThus $r = r_{17 / 9} = (\\frac{34}9, \\frac{44}9, -\\frac{11}9)$.\nWe then have\n\\begin{align*}d(L_1, \\pi) & = d (q, r) = |\\hspace{-0.5mm}| {(0,3,-5)-(\\frac{34}9, \\frac{44}9, -\\frac{11}9)} |\\hspace{-0.5mm}| \\\\\n& = |\\hspace{-0.5mm}| {(-\\frac{34}9,-\\frac{17}9,-\\frac{34}9)} |\\hspace{-0.5mm}| = \\frac{17}3.\n\\end{align*}\n\nPart (4): we already know the lines are skew, so there will be unique points in $L_1$ and $L_2$, respectively, realizing the minimal distance.\nWe compute these points using Theorem 7.59(4). A general point $p_t \\in L_2$ is of the form $p_t = (t, 2, 4-t)$ (with $t \\in {\\bf R}$).\nBy (7.75), a general point in $L_1$ is of the form $q_s = (s, 3+2s,-5-2s)$ (with $s \\in {\\bf R}$).\nThe vector $p_t - q_s = (s-t, 1+2s,-9-2s+t)$ needs to be orthogonal to the directions of $L_1$ and $L_2$, which we computed above as $(1,2,-2)$ and $(1,0,-1)$.\nThis leads to the linear system\n\\begin{align*}\n0 & = s-t+2(1+2s)-2(-9-2s+t) = 9s-3t+20 \\\\\n0 & = s-t -(-9-2s+t) = 3s-2t+9\n\\end{align*}\nThis can be solved to $t=\\frac 73$ and $s = -\\frac{13}9$, which gives\n\\begin{align*}\np_{7/3} & = (\\frac 73, 2, \\frac 53), \\\\\nq_{-13/9}& =(-\\frac{13}9, -\\frac{17}9, -\\frac{19}9).\n\\end{align*}", "primary": ["classify-relative-position-of-lines", "construct-plane-and-find-equation", "compute-distance-between-affine-subspaces"], "secondary": ["convert-between-cartesian-and-parametric-form", "compute-orthogonal-projection", "perform-gaussian-elimination"]}, {"label": "ex:euclid-6-20", "displayLabel": "7.24", "statement": "We endow ${\\bf R}^4$ with its usual scalar product. We consider the subspace $U \\subset {\\bf R}^4$ defined by the equations\n$$\n\\left\\{\\begin{aligned}\n& x_1 + x_3 = 0 \\\\\n& 2x_1 + x_2 - x_4 = 0\n\\end{aligned}\\right.\n$$\n\\begin{enumerate}\n\\item Compute an orthogonal basis of $U$.\n\\item Given the vector $w_1 = (1,1,-1,-1)$ find a vector $w_2$ that is orthogonal to $w_1$ and such that the vector space $W := L(w_1, w_2)$ satisfies $W = U^\\perp$.\n\\item Write down a system of linear equations in the unknowns $x_1, x_2, x_3, x_4$ whose solution set is the subspace $W = U^\\perp$.\n\\item Given the vector $v = (3,1,-1,1)$ find a vector $u \\in U$ such that the vector $v+u$ has minimal norm.\n\\end{enumerate}", "solution": "This solution illustrates Task 7.61, Task 7.63.\n\nWe first compute a basis of $U$ by computing the kernel of the matrix\n$$\\left ( \\begin{array}{cccc}\n1 & 0 & 1 & 0 \\\\\n2 & 1 & 0 & -1\n\\end{array} \\right )\n\\leadsto\n\\left ( \\begin{array}{cccc}\n1 & 0 & 1 & 0 \\\\\n0 & 1 & -2 & -1\n\\end{array} \\right )\n$$\nThe third and fourth variables are free, and a basis of $U$ is given by the vectors $u_1 = (0, 1, 0, 1)$ and $u_2 = (-1, 0, 1, 0)$.\nThese two vectors happen to be orthogonal, so they form an orthogonal basis. (If one chooses a different basis of $U$, one may apply the Gram--Schmidt algorithm to make them orthonormal, for example.)\n\nSince $\\dim U^\\bot = 4 - \\dim U = 2$, it suffices to find any non-zero vector $w_2 \\in U^\\bot$ that is also orthogonal to $w_1$.\nWe are thus looking for a non-zero vector in $L((-1,0,1,0),(0,1,0,1),(1,1,-1,-1))^\\bot$.\nThis is the kernel of the matrix\n$$\\left ( \\begin{array}{cccc}\n-1 & 0 & 1 & 0 \\\\\n0 & 1 & 0 & 1 \\\\\n1 & 1 & -1 & -1\n\\end{array} \\right )\n\\leadsto\n\\left ( \\begin{array}{cccc}\n0 & 1 & 0 & -1 \\\\\n0 & 1 & 0 & 1 \\\\\n1 & 1 & -1 & -1\n\\end{array} \\right ),$$\nso if $w_2 =(x_1, \\dots, x_4)$, we obtain $x_2 = x_4=0$ and $x_1 = x_3$, so $w_2 = (1,0,1,0)$ satisfies the requested properties.\n\nThe orthogonal complement $U^\\perp$ is defined by the equations\n\\begin{align*}\n-x_1 + x_3 & = 0 \\\\\nx_2 + x_4 & = 0.\n\\end{align*}", "primary": ["compute-orthonormal-basis", "compute-orthogonal-complement", "compute-orthogonal-projection"], "secondary": ["perform-gaussian-elimination", "parametrize-solution-set"]}, {"label": "ex:euclid-6-21", "displayLabel": "7.25", "statement": "Consider the lines (contained in ${\\bf R}^3$) \n$$\nL: \\left\\{\\begin{aligned}\n& x - 2y + 4 = 0\\\\\n& y + z -3 = 0\n\\end{aligned}\\right. \\qquad\nM: \\left\\{\\begin{aligned}\n& x+2z-5 = 0\\\\\n& x-2y + 1 = 0\n\\end{aligned}\\right.\n$$\n\\begin{enumerate}\n\\item Verify that $L$ and $M$ are parallel and write down the cartesian equation of the plane containing $L$ and $M$.\n\\item Given the point $p  = (0,2,1) \\in L$ find the point $q \\in M$ such that the line passing through $p$ and $q$ is orthogonal to $L$ and to $M$.\n\\item Write down the cartesian equation of the plane $X$ containing the line $L$ and passing through the point $r = (-1,1,0)$.\n\\item Write down the parametric equation of the line $N$ contained in the plane $X$, passing through $r = (-1,1,0)$ and orthogonal to the line $L$.\n\\end{enumerate}", "solution": "This solution illustrates Task 7.70, Task 7.67, Task 7.68.\n\nThe points $l_1 := (0,2,1)$ and $l_2 := (2, 3, 0)$ lie in $L$, so that the direction vector of $L$, which is the difference of the two points, is $(2,1,-1)$.\n\nLikewise the points $m_1 := (1,1,2)$ and $(5,3,0)$ lie on $M$, so that its direction vector is $(4,2,-2)$.\nThis is a multiple of $(2,1,1)$, so the two direction vectors span the same (1-dimensional) subspace of ${\\bf R}^3$, so the lines are parallel.\n\nIn order to compute the plane $P$ containing $M$ and $L$ we use that $P$ is uniquely determined (since $M \\ne L$) by the condition that $l_1, l_2, m_1 \\in P$.\nThus\n\\begin{align*}P & = l_1 + L(l_2-l_1, m_1-l_1) \\\\\n& = (0,2,1) + L((2,1,-1), (1,-1,1)).\n\\end{align*}\nIn order to compute the cartesian form of $P$, we compute the orthogonal complement of $(2,1,-1)$ and $(1,-1,1)$: it is the 1-dimensional subspace of ${\\bf R}^3$ spanned by a vector $(a,b,c)$ satisfying $2a+b-c=0$ and $a-b+c=0$. This implies $a=0$ and $b=c$, and $c$ is a free variable. Thus the normal vector of the plane $P$ is $(0, 1,1)$ (or any nonzero multiple thereof).\nTaking into account that $(0,2,1) \\in P$, we have\n\\begin{align*}\nP & = \\{v \\in {\\bf R}^3 | {\\left \\langle v, (0,1,1) \\right \\rangle} = {\\left \\langle (0,2,1), (0,1,1) \\right \\rangle} \\} \\\\\n& = \\{v \\in {\\bf R}^3 | {\\left \\langle v, (0,1,1) \\right \\rangle} = 3 \\} \\\\\n&= \\{v=(x,y,z) | y+z = 3\\}.\n\\end{align*}\n\nFor the second part, we first compute what a general point $q \\in M$ looks like.\nFrom the above, we have\n$$M = (1,1,2) + L(4,2,-2),$$\nso \n$$q = (1+4r, 1+2r, 2-2r), r \\in {\\bf R}.$$\nFor $p=(0,2,1)$, this implies \n$$p-q = (-4r-1, -2r+1, 2r-1).$$\nThis vector needs to be orthogonal to the direction vector of $L$, which is $(2,1,-1)$.\nThus\n\\begin{align*}\n0 & = 2(-4r-1)+1(-2r+1)-(2r-1) \\\\\n& = -12r\n\\end{align*}\nso that $r=0$, and $q = (1,1,2)$.\n\nFor the third part, we write $X$ in cartesian form\n$$X= \\{v \\in {\\bf R}^3 | {\\left \\langle v, a \\right \\rangle} = b\\}.$$\nWe need to compute the normal vector $a$ and the number $b$.\nSince we seek $L \\subset X$, the direction vector of $L$, $(2,1,-1)$ needs to be orthogonal to $a = (\\alpha, \\beta, \\gamma)$, i.e.\n$$2 \\alpha + \\beta - \\gamma = 0.$$\nMoreover, the vector $w := r-l_1=(-1,1,0)-(0,2,1) = (-1,-1,-1)$ needs to be orthogonal to $a$ as well, since $r$ and $l_1 \\in X$.\nThus\n$$-\\alpha - \\beta - \\gamma = 0.$$\nWe solve this as $\\alpha = 2 \\gamma$, $\\beta = -3\\gamma$, and $\\gamma \\in {\\bf R}$ is a free variable, which we choose to be $1$.\nThus $a = (2, -3, 1)$. We compute $b$ by observing that the equation defining $X$ needs to be satisfied for $r$, so that $d = {\\left \\langle a, r \\right \\rangle} = -5$.\nThus\n$$X = \\{(x,y,z) | 2x-3y+z = -5 \\}.$$\n\nFor the last part, we have\n$$N = r + L(w),$$\nand we need to compute the direction vector $w$ of the line $N$.\nSince $N \\subset X$, we have $w \\bot a = (2,-3,1)$.\nSince $N \\bot L$, we have $w \\bot (2,1,-1)$ (the direction vector of $L$).\nIn other words, $w$ is a vector in the orthogonal complement of these two vectors, or equivalently, the kernel of the matrix\n$$\\left ( \\begin{array}{ccc}\n2 & -3 & 1 \\\\\n2 & 1 & -1\n\\end{array} \\right )\n\\leadsto \n\\left ( \\begin{array}{ccc}\n2 & -3 & 1 \\\\\n0 & 4 & -2\n\\end{array} \\right ).$$\nThus for $w = (\\alpha, \\beta, \\gamma) $, $\\gamma$ is a free variable, which we can choose to be 2, so that $\\beta = \\frac 12 \\gamma = 1$, and $\\alpha = \\frac{3\\beta - \\gamma}2=\\frac{3-2}2=\\frac 12$.\nThus\n$$N = (-1,1,0) + L(\\frac 12, 1, 2)$$\nor, equivalently, for example:\n$$N = (-1,1,0) + L(1, 2, 4).$$", "primary": ["classify-relative-position-of-lines", "construct-plane-and-find-equation", "construct-line-orthogonal-to-line"], "secondary": ["compute-orthogonal-complement", "convert-between-cartesian-and-parametric-form"]}, {"label": "ex:euclid-6-22", "displayLabel": "7.26", "statement": "Let $U \\subset {\\bf R}^4$ be the subspace defined by the equations\n$$\nU: \\left\\{\\begin{aligned}\n& x_1 - 2x_2 + x_4 = 0 \\\\\n& 3x_2 + x_3 - 2x_4 = 0 \\\\\n& 3x_1 + 2x_3 + t\\,x_4 = 0\n\\end{aligned}\\right.\n$$\n\\begin{enumerate}\n\\item Find the value of $t$ for which $U$ has dimension 2. For this value of $t$, compute a basis of $U$.\n\\item Apply the Gram--Schmidt method to the basis computed in part (a) in order to compute an orthogonal basis of $U$.\n\\item For the value of $t$ computed in part (a), compute a basis of $U^\\perp$.\n\\item Given  $v = (3,2,2,-2) \\in {\\bf R}^4$ compute the cartesian equation of a subspace $W$ of dimension $3$ such that the orthogonal projection of $v$ onto $W$ is equal to the vector $w  = (1,2,1,1)$.\n\\end{enumerate}", "solution": "This solution illustrates Task 7.61, Task 7.63.\n\nWe form the matrix associated to the linear system and bring it into row echelon form\n$$\\left ( \\begin{array}{cccc}\n1 & -2 & 0 & 1 \\\\\n0 & 3 & 1 & -2 \\\\\n3 & 0 & 2 & t\n\\end{array} \\right )\n\\leadsto\n\\left ( \\begin{array}{cccc}\n1 & -2 & 0 & 1 \\\\\n0 & 3 & 1 & -2 \\\\\n0 & 6 & 2 & t-3\n\\end{array} \\right )\n\\leadsto\n\\left ( \\begin{array}{cccc}\n1 & -2 & 0 & 1 \\\\\n0 & 3 & 1 & -2 \\\\\n0 & 0 & 0 & t+1\n\\end{array} \\right )\n$$\nThis matrix has rank 2 if $t+1 = 0$, i.e., if $t=-1$. Otherwise, for $t\\ne -1$, its rank is 3.\nWe compute a basis of $U$ for $t=-1$ using Method 2.31. The result is $u_1=(-2,-1,3,0)$ and $u_2=(1,2,0,3)$.\n\nWe apply Proposition 7.32:\n\\begin{align*}\nw_1 & = u_1 / |\\hspace{-0.5mm}| {u_1} |\\hspace{-0.5mm}| = \\frac 1 {\\sqrt{14}} u_1. \\\\\nw'_2 & = u_2 - {\\left \\langle u_2, w_1 \\right \\rangle} w_1 \\\\\n& = (1,2,0,3) + \\frac {4}{14} (-2,-1,3,0) \\\\\n& = (3/7, 12/7, 6/7, 3).\n\\end{align*}\nThe vectors $w_1$ and $w'_2$ form an orthonormal basis of $U$. \n(It is possible, but here not asked for, to compute $w_2 = w'_2 / |\\hspace{-0.5mm}| {w'_2} |\\hspace{-0.5mm}|$, then $w_1$ and $w_2$ form an orthonormal basis of $U$.)\n\nThe subspace $U^\\perp$ consists of the vectors that are orthogonal on the basis vectors of $U$, i.e., the \\emph{kernel} of the matrix\n$$\\left ( \\begin{array}{cccc}\n-2 & -1 & 3 & 0 \\\\\n1 & 2 & 0 & 3\n\\end{array} \\right ).$$\nA basis of this can be computed again by Method 2.31, for example $(2,-1,1,0)$ and $(1,-2,0,1)$ form a basis of $U^\\perp$.\n\nThe subspace $W$ will be the orthogonal complement of the line passing through $v$ and $w$. The direction of that line is $v-w = (2,0,1,-3)$, so that\n$$W = \\{2x_1 + x_3 -3x_4 = 0\\}.$$", "primary": ["case-split-on-parameter", "compute-orthonormal-basis", "compute-orthogonal-complement", "decide-existence-of-projection-subspace"], "secondary": ["perform-gaussian-elimination", "find-basis-and-dimension", "compute-rank-of-matrix", "parametrize-solution-set"]}, {"label": "ex:euclid-6-23", "displayLabel": "7.27", "statement": "We consider the following points (in ${\\bf R}^3$) \n$A = (6,-1,-4)$, $B = (1,1,-1)$ and the plane $X: 2x - y - 2z = 3$.\n\\begin{enumerate}\n\\item Verify that $B \\in X$. Let $C$ be the orthogonal projection of $A$ onto the plane $X$. Compute $C$.\n\n\\item Compute the cartesian equation of the plane containing the triangle $\\triangle ABC$.\n\\item Compute the parametric equation of the line that a) passes through $B$, b) is contained in the plane $X$ and c) is orthogonal to the line passing through $A$ and $B$.\n\\item Compute the value of the parameter $t$ such that the line \n$\nM_t: \\left\\{\\begin{aligned}\n& t\\,x - y + 2 = 0 \\\\\n& x + z + 1 = 0\n\\end{aligned}\\right.\n$\nis parallel to the plane $X$.\n\\end{enumerate}", "solution": "This solution illustrates Task 7.66, Task 7.68, Task 7.72.\n\nWe verify $B \\in X$ by plugging in the coordinates of $B$:\n$$2 \\cdot 1 - 1 - 2 \\cdot (-1) = 3,$$\nso it satisfies the equation defining $X$.\nWe now compute $C = p_X(A)$. The normal vector of the plane $X$ is $n = (2,-1,-2)$.\nThus $C = A - r n = (6-2r,-1+r,-4+2r)$, for some $r \\in {\\bf R}$. In order for $C \\in X$, this needs to satisfy the equation defining $X$, i.e.,\n$$2(6-2r)-(-1+r)-2(-4+2r) = 3,$$\nwhich simplifies to $21 - 9r = 3$, i.e., $r = 2$ and $C = (2,1,0)$.\n\nThe plane containing the points $A, B, C$ is of the form\n$$A + L(C-A, B-A).$$\nIn order to present this in cartesian form, we compute the orthogonal complement of $C-A=(-4,2,4)$ and $B-A=(-5,2,3)$, which is the line spanned by $w := (-1, -4, 1)$.\nThe plane is then given by\n$$\\{x \\in {\\bf R}^3 | {\\left \\langle x, w \\right \\rangle} = {\\left \\langle A, w \\right \\rangle}\\},$$\ni.e.,\n$$\\{x \\in {\\bf R}^3 | -x_1 - 4x_2 + x_3 = -6\\}.$$\n\nThe line that a) passes through $B$, b) is contained in the plane $X$ and c) is orthogonal to the line passing through $A$ and $B$, is given by \n$$L = B + L(v).$$\nBy the conditions, ${\\left \\langle v, B-A \\right \\rangle} = 0$ and ${\\left \\langle v, n \\right \\rangle} = 0$. I.e., $v$ is any non-zero vector in the orthogonal complement of $B-A=(-5,2,3)$ and $n=(2,-1,-2)$, for example $v = w = (-1,-4,1)$.\nThus\n$$L =(1,1,-1) + L(-1,-4,1).$$\n\nThe direction vector of $M_t$ can be found by choosing two points on $M_t$, for example $E = (0,2,-1)$ and $F = (1,2+t,-2)$. So the direction vector of $M_t$ is equal to $F-E = (1,t,-1)$.\nThis needs to be orthogonal to $n = (2,-1,-2)$.\nI.e., ${\\left \\langle n, F-E \\right \\rangle} = 0$, which gives $2 - t +2 = 0$, so $t=4$.", "primary": ["compute-orthogonal-projection", "construct-plane-and-find-equation", "construct-line-orthogonal-to-line", "check-line-parallel-to-plane"], "secondary": ["test-vector-is-solution", "case-split-on-parameter"]}, {"label": "ex:euclid-6-24", "displayLabel": "7.28", "statement": "Let $V = \\mathrm{Mat}(2,\\mathbf{R})$ be the vector space of real $2 \\times 2$ matrices.\nIn $V$ we can define the inner product of two matrices using one of the following two formulas, (1) or (2):\n$$\n\\text{(1) } \\langle A, B \\rangle = {\\mathrm {tr}}(A\\,B), \\qquad\n\\text{(2) } \\langle A, B \\rangle = {\\mathrm {tr}}(A\\,B^T).\n$$\n(where ${\\mathrm {tr}}$ denotes the trace of a matrix, cf.~Exercise 4.24 for its definition)\n\\begin{enumerate}\n\\item Identifying the $2 \\times 2$ matrices with the vectors of $\\mathbf{R}^4$, which of the two formulas (1) or (2) corresponds to the standard inner product in $\\mathbf{R}^4$\\,?\n\\item In the sequel, we use the formula (1) or (2) found in the first part of the exercise. \nLet $U$ be the vector subspace of $V$ spanned by the matrices $u_1 = \\big(\\begin{smallmatrix} 0 & 2 \\\\ 1 & -1 \\end{smallmatrix}\\big)$ and $u_2 = \\big(\\begin{smallmatrix} 1 & 0 \\\\ 3 & -1 \\end{smallmatrix}\\big)$.\nFind an orthogonal basis of $U$.\nAlso compute the orthogonal projection of the matrix $u_2$ onto the subspace spanned by $u_1$.\n\\end{enumerate}", "solution": "We identify a matrix $\\big(\\begin{smallmatrix} a & b \\\\ c & d \\end{smallmatrix}\\big) \\in V = \\mathrm{Mat}(2,{\\bf R})$ with the vector $(a,b,c,d) \\in {\\bf R}^4$.\nWe first determine which of the two formulas gives the standard scalar product on ${\\bf R}^4$ (cf.~Definition 7.1).\nFor $A = \\big(\\begin{smallmatrix} a_1 & b_1 \\\\ c_1 & d_1 \\end{smallmatrix}\\big)$ and $B = \\big(\\begin{smallmatrix} a_2 & b_2 \\\\ c_2 & d_2 \\end{smallmatrix}\\big)$, using the definition of the trace (Exercise 4.24) we compute\n$$\n{\\mathrm {tr}}(A\\,B) = a_1 a_2 + b_1 c_2 + c_1 b_2 + d_1 d_2,\n\\qquad\n{\\mathrm {tr}}(A\\,B^T) = a_1 a_2 + b_1 b_2 + c_1 c_2 + d_1 d_2.\n$$\nThe second expression is exactly the standard scalar product ${\\left \\langle (a_1,b_1,c_1,d_1), (a_2,b_2,c_2,d_2) \\right \\rangle}$ on ${\\bf R}^4$, while the first one is not (it pairs the off-diagonal entries crosswise).\nHence formula (2), ${\\left \\langle A, B \\right \\rangle} = {\\mathrm {tr}}(A\\,B^T)$, is the one corresponding to the standard scalar product, and we use it from now on.\n(Alternatively one may also note that (1) can not be correct in view of the fact that for $A = B = \\big(\\begin{smallmatrix} 0 & 1 \\\\ 0 & 0 \\end{smallmatrix}\\big)$ we have $AB=0$, the zero matrix, cf.~Exercise 4.26, so this inner product is degenerate, and therefore not a scalar product,  cf.~Definition 7.15).\n\nIn the identification with ${\\bf R}^4$ the two given matrices become\n$$\nu_1 = \\big(\\begin{smallmatrix} 0 & 2 \\\\ 1 & -1 \\end{smallmatrix}\\big) \\leftrightarrow (0,2,1,-1),\n\\qquad\nu_2 = \\big(\\begin{smallmatrix} 1 & 0 \\\\ 3 & -1 \\end{smallmatrix}\\big) \\leftrightarrow (1,0,3,-1).\n$$\nTo find an orthogonal basis of $U = L(u_1, u_2)$ we apply the Gram--Schmidt procedure (Proposition 7.32).\nWe keep $w_1 := u_1$ and compute\n$$\n{\\left \\langle u_2, u_1 \\right \\rangle} = 1\\cdot 0 + 0 \\cdot 2 + 3 \\cdot 1 + (-1)(-1) = 4,\n\\qquad\n{\\left \\langle u_1, u_1 \\right \\rangle} = 0 + 4 + 1 + 1 = 6.\n$$\nThen the vector\n$$\nw_2' = u_2 - \\frac{{\\left \\langle u_2, u_1 \\right \\rangle}}{{\\left \\langle u_1, u_1 \\right \\rangle}} u_1\n= (1,0,3,-1) - \\frac{4}{6}(0,2,1,-1)\n= \\left(1, -\\frac43, \\frac73, -\\frac13\\right)\n$$\nis orthogonal to $w_1$, namely the orthogonal projection of $u_2$ onto the subspace spanned by $u_1$, cf.~(7.26).\nTo avoid fractions we may scale by $3$ and take $w_2 := 3 w_2' = (3,-4,7,-1)$, which is still orthogonal to $w_1$: indeed ${\\left \\langle w_1, w_2 \\right \\rangle} = {\\langle w_1, 3w_2' \\rangle} = 3 \\langle w_1, w'_2 \\rangle = 3 \\cdot 0 = 0$.\nTranslating back to matrices, an orthogonal basis of $U$ is\n$$\nw_1 = \\big(\\begin{smallmatrix} 0 & 2 \\\\ 1 & -1 \\end{smallmatrix}\\big),\n\\qquad\nw_2 = \\big(\\begin{smallmatrix} 3 & -4 \\\\ 7 & -1 \\end{smallmatrix}\\big).\n$$\n\nThe orthogonal projection of $u_2$ onto the line $L(u_1)$ is again given by Theorem 7.24, specifically the formula in Equation 7.26 for the orthogonal basis $u_1$:\n$$\np_{L(u_1)}(u_2) = \\frac{{\\left \\langle u_2, u_1 \\right \\rangle}}{{\\left \\langle u_1, u_1 \\right \\rangle}} u_1\n= \\frac{4}{6}\\,u_1 = \\frac23 (0,2,1,-1),\n$$\nthat is, as a matrix,\n$$\np_{L(u_1)}(u_2) = \\frac23 \\big(\\begin{smallmatrix} 0 & 2 \\\\ 1 & -1 \\end{smallmatrix}\\big)\n= \\big(\\begin{smallmatrix} 0 & 4/3 \\\\ 2/3 & -2/3 \\end{smallmatrix}\\big).\n$$", "primary": ["use-scalar-product-definition", "compute-orthonormal-basis", "compute-orthogonal-projection"], "secondary": ["apply-matrix-algebra", "test-linear-independence"]}, {"label": "ex:maps-exercise-002", "displayLabel": "4.2", "statement": "Determine the matrix $A$ such that $Av = \\left ( \\begin{array}{c}\n-y \\\\\nx\n\\end{array} \\right )$.\nDescribe the behaviour of the function $v \\mapsto Av$ geometrically.", "solution": "Using Definition 4.9, Subsection 4.2.1, for\n$$A = \\left ( \\begin{array}{cc}\na_{11} & a_{12} \\\\\na_{21} & a_{22}\n\\end{array} \\right )$$\nand $v=\\left ( \\begin{array}{c}\nx \\\\ y \\end{array} \\right )$ we have\n$$Av = \\left ( \\begin{array}{c}\na_{11}x+a_{12}y \\\\\na_{21}x+a_{22}y\n\\end{array} \\right ).$$\nWe want\n$$Av = \\left ( \\begin{array}{c}\n-y \\\\\nx\n\\end{array} \\right ),$$\nso comparing coefficients gives\n$a_{11}=0$, $a_{12}=-1$, $a_{21}=1$, and $a_{22}=0.$\nHence\n$$A = \\left ( \\begin{array}{cc}\n0 & -1 \\\\\n1 & 0\n\\end{array} \\right ).$$\n\nGeometrically, this is a counterclockwise rotation by $90^\\circ$ (equivalently, clockwise by $270^\\circ$), compare Example 4.17.", "primary": ["build-matrix-of-linear-map"], "secondary": ["interpret-solutions-geometrically"]}, {"label": "ex:maps-exercise-003", "displayLabel": "4.3", "statement": "Write down the matrix $A$ such that the function $f : {\\bf R}^4 \\to {\\bf R}^3, v \\mapsto Av$ satisfies\n$$f((1,0,0,0)) = (1,2,3), f((0,1,0,0)) = (0, 0, 7),$$ \n$$f((0,0,1,0)) = (0, 0, 0), f((0,0,0,1)) = (13, 0, -1).$$\nDetermine $\\ker f$ and ${\\operatorname{im}\\ } f$ (i.e., determine a basis and their dimension).", "solution": "By Proposition 4.44 (applied to the standard basis, cf.~Example 3.62),\nthe columns of the matrix $A$ are exactly the vectors $f(e_1),\\dots,f(e_4)$.\nHence\n$$A = \\left ( \\begin{array}{cccc}\n1 & 0 & 0 & 13 \\\\\n2 & 0 & 0 & 0 \\\\\n3 & 7 & 0 & -1\n\\end{array} \\right ).$$\n\nBy Definition 4.22, to determine $\\ker f$, we need to solve $Ax=0$.\nSince there are so many zeros in the matrix, we do this by hand; alternatively one could also use Gaussian elimination (cf.~Method 2.31).\nWith $x=(x_1,x_2,x_3,x_4)^T$, this system reads\n\\begin{align*}\nx_1 + 13x_4 & = 0 \\\\\n2x_1 & = 0 \\\\\n3x_1 + 7x_2 - x_4 & = 0.\n\\end{align*}\nFrom $2x_1=0$ we get $x_1=0$, then $x_4=0$, then $x_2=0$; $x_3$ is free.\nSo\n$$\\ker f = L\\left(\\left ( \\begin{array}{c}\n0 \\\\\n0 \\\\\n1 \\\\\n0\n\\end{array} \\right )\\right), \\qquad \\dim \\ker f = 1.$$\n\nTo compute the image, we use Proposition 4.32: \n$$\\operatorname{im} f = L\\left(\\left ( \\begin{array}{c}\n1 \\\\\n2 \\\\\n3\n\\end{array} \\right ),\n\\left ( \\begin{array}{c}\n0 \\\\\n0 \\\\\n7\n\\end{array} \\right ),\n\\left ( \\begin{array}{c}\n0 \\\\\n0 \\\\\n0\n\\end{array} \\right ),\n\\left ( \\begin{array}{c}\n13 \\\\\n0 \\\\\n-1\n\\end{array} \\right )\\right).$$\nRemoving the zero vector, consider\n$$u_1=\\left ( \\begin{array}{c}\n1 \\\\\n2 \\\\\n3\n\\end{array} \\right ),\\quad\nu_2=\\left ( \\begin{array}{c}\n0 \\\\\n0 \\\\\n7\n\\end{array} \\right ),\\quad\nu_3=\\left ( \\begin{array}{c}\n13 \\\\\n0 \\\\\n-1\n\\end{array} \\right ).$$\nIf $a_1u_1+a_2u_2+a_3u_3=0$, then from the second coordinate $2a_1=0$, hence $a_1=0$;\nfrom the first coordinate $13a_3=0$, hence $a_3=0$;\nfrom the third coordinate $7a_2=0$, hence $a_2=0$.\nSo $u_1,u_2,u_3$ are linearly independent and therefore form a basis of $\\operatorname{im} f$.\nInstead of the above approach, one may also bring $A$ to row-echelon form and observe that the resulting matrix has leading ones in the first, second, and fourth columns, so we again obtain that these three columns of $A$ form a basis of $\\operatorname{im} f$ (Proposition 4.32).\nIn particular,\n$$\\dim \\operatorname{im} f = 3.$$\nAs a check, Theorem 4.26 gives\n$$4 = \\dim {\\bf R}^4 = \\dim \\ker f + \\dim \\operatorname{im} f = 1+3.$$", "primary": ["build-matrix-of-linear-map", "compute-kernel-of-linear-map", "compute-image-of-linear-map"], "secondary": ["perform-gaussian-elimination", "find-basis-and-dimension", "apply-rank-nullity-theorem"]}, {"label": "ex:maps-exercise-004", "displayLabel": "4.4", "statement": "Compute the rank of \n$$A = \\left ( \\begin{array}{cccc}\n0 & 1 & 2 & 1 \\\\\n1 & 1 & 1 & 0 \\\\\n0 & -1 & 1 & 1 \\\\\n1 & 1 & 4 & 2\n\\end{array} \\right ).$$", "solution": "To compute the rank, we apply Method 2.31, which requires us to bring the matrix into row-echelon form using Gaussian elimination (Method 2.29). We perform the following elementary row operations\n(Definition 2.28).\n\n\\begin{align*}\nA = \\left ( \\begin{array}{cccc}\n0 & 1 & 2 & 1 \\\\\n1 & 1 & 1 & 0 \\\\\n0 & -1 & 1 & 1 \\\\\n1 & 1 & 4 & 2\n\\end{array} \\right )\n&\\leadsto\n\\left ( \\begin{array}{cccc}\n1 & 1 & 1 & 0 \\\\\n0 & 1 & 2 & 1 \\\\\n0 & -1 & 1 & 1 \\\\\n1 & 1 & 4 & 2\n\\end{array} \\right ) \n\\leadsto\n\\left ( \\begin{array}{cccc}\n1 & 1 & 1 & 0 \\\\\n0 & 1 & 2 & 1 \\\\\n0 & 0 & 3 & 2 \\\\\n0 & 0 & 3 & 2\n\\end{array} \\right ) \\\\\n&\\leadsto\n\\left ( \\begin{array}{cccc}\n1 & 1 & 1 & 0 \\\\\n0 & 1 & 2 & 1 \\\\\n0 & 0 & 3 & 2 \\\\\n0 & 0 & 0 & 0\n\\end{array} \\right ).\n\\end{align*}\nThis row-echelon matrix has exactly 3 leading ones, \nso by Proposition 4.32 we get $\\operatorname{rk}(A) = 3.$", "primary": ["compute-rank-of-matrix"], "secondary": ["perform-gaussian-elimination", "recognize-row-echelon-form"]}, {"label": "ex:maps-exercise-005", "displayLabel": "4.5", "statement": "Consider the linear map $f : {\\bf R}^3 \\to {\\bf R}^3$ described in Example 4.43.\nDetermine the matrix of $f$ with respect to the standard basis $e_1, e_2, e_3$ (both in the ``source'' ${\\bf R}^3$, and also in the ``target'' ${\\bf R}^3$).", "solution": "From Example 4.43 we have\n$$f(e_1)=f(v_1)=(2,-1,0), \\qquad f(e_2)=f(v_2)=(1,-1,1),$$\nand, since $e_3=v_2-v_3$ there,\n$$f(e_3)=f(v_2-v_3)=f(v_2)-f(v_3)=(1,-3,-1).$$\n\nBy Proposition 4.19, the matrix of $f$ with respect to the standard basis in source and target has columns\n$f(e_1),f(e_2),f(e_3)$.\nHence\n$$A = \\left ( \\begin{array}{ccc}\n2 & 1 & 1 \\\\\n-1 & -1 & -3 \\\\\n0 & 1 & -1\n\\end{array} \\right ).$$\nThis is exactly the matrix already identified in Example 4.43.", "primary": ["build-matrix-of-linear-map"], "secondary": ["use-definition-of-linear-map", "express-as-linear-combination"]}, {"label": "ex:maps-exercise-006", "displayLabel": "4.6", "statement": "For $\\lambda \\in {\\bf R}$ consider the subspace of ${\\bf R}^3$ defined as\n$$W_\\lambda = L((1,1+\\lambda,-1), (2,\\lambda-2,\\lambda+2)).$$\nFor each $\\lambda \\in {\\bf R}$, find a basis and the dimension of $W_\\lambda$.", "solution": "Let\n$v_1=(1,1+\\lambda,-1)$, $v_2=(2,\\lambda-2,\\lambda+2)$.\nBy definition,\n$W_\\lambda=L(v_1,v_2).$\nSo a basis of $W_\\lambda$ is either $\\{v_1,v_2\\}$ (if they are linearly independent) or a single nonzero vector among them (if they are dependent), cf.~Definition 3.49, Definition 3.61.\n\nTo find when they are dependent, check whether $v_2=t v_1$ for some $t\\in{\\bf R}$.\nFrom the first coordinate we get $2=t\\cdot 1$, hence $t=2$.\nThen the second coordinate gives\n$\\lambda-2=2(1+\\lambda)$ which holds precisely if $\\lambda=-4$.\nFor $\\lambda=-4$ the third coordinates also agree.\nTherefore:\n\\begin{itemize}\n\t\\item If $\\lambda\\neq -4$, the vectors $v_1,v_2$ are linearly independent and therefore a basis of $W_\\lambda$. Thus\n$\\dim W_\\lambda=2$ by Definition 3.66.\n\t\\item If $\\lambda=-4$, then $v_2=2v_1$, so $v_1=(1,-3,-1)$ is a basis vector of $W_{-4}$ (or any other non-zero multiple of it, such as $v_2)$. We have $\\dim W_{-4}=1$.\n\\end{itemize}", "primary": ["find-basis-and-dimension", "case-split-on-parameter"], "secondary": ["test-linear-independence"]}, {"label": "ex:maps-exercise-007", "displayLabel": "4.7", "statement": "Determine the rank of\n$$\\left ( \\begin{array}{ccc}\n\\alpha & 0 & 0 \\\\\n0 & \\alpha & 1+\\alpha \\\\\n\\alpha & 1 & 2\n\\end{array} \\right )$$\nfor each $\\alpha \\in {\\bf R}$.", "solution": "Let $A = \\begin{pmatrix} \\alpha & 0 & 0 \\\\ 0 & \\alpha & 1+\\alpha \\\\ \\alpha & 1 & 2 \\end{pmatrix}$ with $\\alpha \\in \\mathbf{R}$. We determine $\\operatorname{rank}(A)$ (for all $\\alpha$) by bringing $A$ to row-echelon form and applying Proposition 4.32.\n\n\\[\nA \\leadsto \\begin{pmatrix}\n\\alpha & 0 & 0 \\\\\n0 & \\alpha & 1+\\alpha \\\\\n0 & 1 & 2\n\\end{pmatrix}\n\\]\nIn order to proceed we need to distinguish whether or not $\\alpha = 0$.\nIf $\\alpha \\neq 0$, we can divide the first row by $\\alpha$ (Definition 2.28)\n\\[\n\\begin{pmatrix}\n1 & 0 & 0 \\\\\n0 & \\alpha & 1+\\alpha \\\\\n0 & 1 & 2\n\\end{pmatrix}\n\\]\nNow, subtract $\\frac{1}{\\alpha}$ times the second row from the third row (still for $\\alpha \\neq 0$):\n\\[\n\\begin{pmatrix}\n1 & 0 & 0 \\\\\n0 & \\alpha & 1+\\alpha \\\\\n0 & 0 & 2 - \\frac{1+\\alpha}{\\alpha}\n\\end{pmatrix}\n\\]\nGiven that $\\alpha \\ne 0$, the rank of this matrix is 2 if $2-\\frac{1+\\alpha}\\alpha = 0$, i.e., if $\\alpha = 1$, and it is 3 otherwise.\nThis finishes the analysis of the case $\\alpha \\ne 0$.\n\nIf $\\alpha = 0$, the matrix reads\n\t\t\t\t\\[\n\t\t\t\t\\begin{pmatrix}\n\t\t\t\t1 & 0 & 0 \\\\\n\t\t\t\t0 & 1 & 2 \\\\\n\t\t\t\t0 & 1 & 2\n\t\t\t\t\\end{pmatrix}\n\t\t\t\t\\]\n\t\t\t\tSince the 3rd row equals the 2nd one, one reads off  $\\operatorname{rank}(A) = 2$ in this case.\n\nIn total we get the following result:\n\\begin{itemize}\n\t\\item If $\\alpha = 1$ or $\\alpha = 0$, $\\operatorname{rank}(A) = 2$.\n\t\\item For all other $\\alpha \\neq 0,1$, $\\operatorname{rank}(A) = 3$.\n\\end{itemize}", "primary": ["compute-rank-of-matrix", "case-split-on-parameter"], "secondary": ["perform-gaussian-elimination"]}, {"label": "ex:maps-3-1", "displayLabel": "4.8", "statement": "Consider the linear map\n$$f : {\\bf R}^2 \\to {\\bf R}^3, \\left ( \\begin{array}{c}\nx_1 \\\\\nx_2\n\\end{array} \\right ) \\mapsto \\left ( \\begin{array}{cc}\n1 & 2 \\\\\n0 & 1 \\\\\n3 & 5\n\\end{array} \\right ) \\left ( \\begin{array}{c}\nx_1 \\\\\nx_2\n\\end{array} \\right ) = \\left ( \\begin{array}{c}\nx_1+2x_2 \\\\\nx_2 \\\\\n3x_1+5x_2\n\\end{array} \\right ).$$\n\\begin{enumerate}\n  \\item Determine $\\ker f$.\n  \\item Does the vector $\\left ( \\begin{array}{c}\n1 \\\\\n0 \\\\\n3\n\\end{array} \\right )$ lie in the image of $f$?\n\\end{enumerate}", "solution": "By Definition 4.22 $\\ker f = \\{ \\left ( \\begin{array}{c}\nx_1 \\\\\nx_2\n\\end{array} \\right ) \\in {\\bf R}^2 \\ | \\ f(\\left ( \\begin{array}{c}\nx_1 \\\\\nx_2\n\\end{array} \\right )) = \\left ( \\begin{array}{c}\n0 \\\\\n0 \\\\\n0\n\\end{array} \\right ) \\}$.\nI.e., the kernel consists of the solutions of the homongeneous system\n\\begin{align*}\nx_1+2x_2 & = 0\\\\\nx_2 & = 0 \\\\\n3x_1+5x_2 & = 0.\n\\end{align*}\nSolving this system gives $x_2 = 0$, then $x_1 = 0$.\nThus, $\\ker f = \\{ \\left ( \\begin{array}{c}\n0 \\\\\n0\n\\end{array} \\right ) \\}$.\n\nFor the second part note that by Definition 4.20, ${\\operatorname{im}\\ } f$ consists precisely of those vectors $\\left ( \\begin{array}{c}\na \\\\\nb \\\\\nc\n\\end{array} \\right ) $ that are of the form $\\left ( \\begin{array}{c}\na \\\\\nb \\\\\nc\n\\end{array} \\right ) = f (\\left ( \\begin{array}{c}\nx_1 \\\\\nx_2\n\\end{array} \\right ))$ for some $x_1, x_2 \\in {\\bf R}$.\nThus, the question amounts to this: do there exist $x_1, x_2 \\in {\\bf R}$ with\n$$ f (\\left ( \\begin{array}{c}\nx_1 \\\\\nx_2\n\\end{array} \\right )) = \\left ( \\begin{array}{c}\nx_1+2x_2 \\\\\nx_2 \\\\\n3x_1+5x_2\n\\end{array} \\right ) = \\left ( \\begin{array}{c}\n1 \\\\\n0 \\\\\n3\n\\end{array} \\right )?$$\nEquivalently, this is a (inhomogeneous) linear system:\n\\begin{align*}\nx_1+2x_2 & = 1\\\\\nx_2 & = 0 \\\\\n3x_1+5x_2 & = 3.\n\\end{align*}\nOne finds the solution $x_1 = 1$, $x_2 = 0$, i.e., $\\left ( \\begin{array}{c}\n1 \\\\\n0 \\\\\n3\n\\end{array} \\right ) = f (\\left ( \\begin{array}{c}\n1 \\\\\n0\n\\end{array} \\right ))$. So the vector lies in the image.", "primary": ["compute-kernel-of-linear-map", "decide-membership-in-span"], "secondary": ["perform-gaussian-elimination", "express-as-linear-combination"]}, {"label": "ex:maps-3-2", "displayLabel": "4.9", "statement": "Consider the linear map\n$$f : {\\bf R}^4 \\to {\\bf R}^3$$\n$$\\left ( \\begin{array}{c}\nx_1 \\\\\nx_2 \\\\\nx_3 \\\\\nx_4\n\\end{array} \\right ) \\mapsto \\left ( \\begin{array}{cccc}\n2 & -1 & 1 & 1 \\\\\n0 & 5 & -3 & -5 \\\\\n3 & -4 & 3 & 4\n\\end{array} \\right ) \\left ( \\begin{array}{c}\nx_1 \\\\\nx_2 \\\\\nx_3 \\\\\nx_4\n\\end{array} \\right ) = \\left ( \\begin{array}{c}\n2x_1-x_2+x_3+x_4 \\\\\n5x_2-3x_3-5x_4 \\\\\n3x_1-4x_2+3x_3+4x_4\n\\end{array} \\right ).$$\n\\begin{enumerate}\n  \\item Determine $\\ker f$.\n  \\item Determine $f^{-1}(\\left ( \\begin{array}{c}\n1 \\\\\n-3 \\\\\n-3\n\\end{array} \\right ))$, i.e., find all the vectors $v \\in {\\bf R}^4$ such that $f(v) = \\left ( \\begin{array}{c}\n1 \\\\\n-3 \\\\\n-3\n\\end{array} \\right )$. Is this subset of ${\\bf R}^4$ a subspace?\n\\end{enumerate}", "solution": "By Definition 4.22, Definition 4.20, both questions are about solving linear systems. We use Gaussian elimination as in Method 2.31.\n\n\\begin{enumerate}\n\\item \nTo compute $\\ker f$, solve the homogeneous system\n\\begin{align*}\n2x_1-x_2+x_3+x_4 & = 0 \\\\\n5x_2-3x_3-5x_4 & = 0\\\\\n3x_1-4x_2+3x_3+4x_4 & = 0.\n\\end{align*}\nIts augmented matrix is\n\\begin{align*}\n\\left(\\begin{array}{cccc|c}\n2 & -1 & 1 & 1 & 0\\\\\n0 & 5 & -3 & -5 & 0\\\\\n3 & -4 & 3 & 4 & 0\n\\end{array}\\right)\n& \\xrightarrow{R_3\\leftarrow 2R_3-3R_1}\n\\left(\\begin{array}{cccc|c}\n2 & -1 & 1 & 1 & 0\\\\\n0 & 5 & -3 & -5 & 0\\\\\n0 & -5 & 3 & 5 & 0\n\\end{array}\\right) \\\\\n& \\xrightarrow{R_3\\leftarrow R_3+R_2}\n\\left(\\begin{array}{cccc|c}\n2 & -1 & 1 & 1 & 0\\\\\n0 & 5 & -3 & -5 & 0\\\\\n0 & 0 & 0 & 0 & 0\n\\end{array}\\right) \\\\\n& \\xrightarrow{R_2\\leftarrow \\frac15R_2,\n\\;R_1\\leftarrow R_1+R_2,\n\\;R_1\\leftarrow \\frac12R_1}\n\\left(\\begin{array}{cccc|c}\n1 & 0 & \\frac15 & 0 & 0\\\\\n0 & 1 & -\\frac35 & -1 & 0\\\\\n0 & 0 & 0 & 0 & 0\n\\end{array}\\right).\n\\end{align*}\nHence $x_3,x_4$ are free variables and\n$x_1=-\\frac15x_3$, $x_2=\\frac35x_3+x_4.$\nPutting $x_3=s$, $x_4=t$, this leads to the following basis of the kernel:\n$$\n\\ker f=\n\\left\\{\n\\begin{pmatrix}\n-\\frac15 s\\\\[2pt]\n\\frac35 s+t\\\\[2pt]\ns\\\\[2pt]\nt\n\\end{pmatrix}\n: s,t\\in\\mathbf R\n\\right\\}\n=\nL\\!\\left(\n\\begin{pmatrix}-1\\\\3\\\\5\\\\0\\end{pmatrix},\n\\begin{pmatrix}0\\\\1\\\\0\\\\1\\end{pmatrix}\n\\right).\n$$\n\n\\item We compute the preimage of $\\left(\\begin{smallmatrix}1\\\\-3\\\\3\\end{smallmatrix}\\right)$ again using Gaussian elimination, applied to the augmented matrix describing the inhomogeneous system:\n\\begin{align*}\n\\left(\\begin{array}{cccc|c}\n2 & -1 & 1 & 1 & 1\\\\\n0 & 5 & -3 & -5 & -3\\\\\n3 & -4 & 3 & 4 & 3\n\\end{array}\\right)\n& \\xrightarrow{R_3\\leftarrow 2R_3-3R_1}\n\\left(\\begin{array}{cccc|c}\n2 & -1 & 1 & 1 & 1\\\\\n0 & 5 & -3 & -5 & -3\\\\\n0 & -5 & 3 & 5 & 3\n\\end{array}\\right) \\\\\n&\n\\xrightarrow{R_3\\leftarrow R_3+R_2}\n\\left(\\begin{ar
